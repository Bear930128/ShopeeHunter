<!-- ⭐ 只展示重點新增區，你直接整份覆蓋我已幫你整好 -->
<script>

/* =========================
   ⭐ 使用者系統
========================= */

let currentUser = localStorage.getItem("shopee_user");

function initUser(){
  if(!currentUser){
    currentUser = prompt("請輸入你的名稱（蒐證用）");
    if(!currentUser){
      currentUser = "未命名";
    }
    localStorage.setItem("shopee_user", currentUser);
  }

  document.getElementById("userDisplay").innerText = currentUser;
}

function changeUser(){
  const name = prompt("輸入新使用者名稱");
  if(name){
    currentUser = name;
    localStorage.setItem("shopee_user", name);
    document.getElementById("userDisplay").innerText = name;
  }
}

/* =========================
   ⭐ 修改 toggleCheck（關鍵）
========================= */

async function toggleCheck(docId){

  const item = items.find(i => i.docId === docId);
  const newValue = !item.checked;

  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}?updateMask.fieldPaths=checked&updateMask.fieldPaths=checkedBy`,
    {
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        fields:{
          checked:{ booleanValue:newValue },
          checkedBy:{ stringValue: currentUser }
        }
      })
    }
  );

  item.checked = newValue;
  item.checkedBy = currentUser;

  applySearch();
}

/* =========================
   ⭐ render 卡片（加標記人）
========================= */

function render(data){

  let html = "";

  data.forEach((item,i)=>{

    const percent = ((item.score/(data[0]?.score||1))*100).toFixed(0);

    html += `
    <div class="card ${item.checked ? 'checked-card' : ''}">
      <div class="rank">#${i+1}</div>
      <div>商品名：${item.title}</div>
      <div>店名：${item.shop}</div>

      <div>👤 標記人：${item.checkedBy || "未標記"}</div>

      <div>銷量：${item.sold}</div>
      <div>粉絲數：${item.fans}</div>
      <div>公司：${item.company || "無"}</div>
      <div>統編：${item.id || "無"}</div>

      <div><b>侵權指數：${percent}%</b></div>

      <div style="margin-top:10px;display:flex;gap:10px;">
        <button class="view" onclick="openUrl('${item.url}')">查看</button>
        <button class="check" onclick="toggleCheck('${item.docId}')">
          ${item.checked ? '取消標記' : '✔標記'}
        </button>
        <button class="delete" onclick="deleteItem('${item.docId}')">刪除</button>
      </div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* =========================
   ⭐ loadData（加欄位）
========================= */

items = data.documents.map(doc=>{
  const f = doc.fields;
  const docId = doc.name.split('/').pop();

  return {
    docId,
    title: f.title?.stringValue||"",
    shop: f.shop?.stringValue||"",
    sold: f.sold?.stringValue||"0",
    fans: f.fans?.stringValue||"0",
    company: f.company?.stringValue||"",
    id: f.taxId?.stringValue||"",
    url: f.url?.stringValue||"",
    checked: f.checked?.booleanValue||false,
    checkedBy: f.checkedBy?.stringValue || "",   // ⭐ 新增
    score: parseNum(f.sold?.stringValue||"0")*0.7 + parseNum(f.fans?.stringValue||"0")*0.3
  };
});

/* =========================
   ⭐ 初始化
========================= */

initUser();

</script>
