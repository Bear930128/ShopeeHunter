<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter 後台</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}
.sidebar{width:240px;background:#020617;height:100vh;padding:20px;}
.sidebar h2{margin-bottom:20px;}
.group-title{margin-top:20px;margin-bottom:8px;font-size:12px;color:#64748b;}
.sidebar button{width:100%;margin:6px 0;padding:12px;background:#0f172a;border:none;color:#94a3b8;cursor:pointer;text-align:left;border-radius:8px;}
.sidebar button:hover{background:#1e293b;color:#fff;}
.main{flex:1;padding:20px;}
.stats{display:flex;gap:20px;margin-bottom:20px;}
.stat{background:#1e293b;padding:20px;flex:1;border-radius:10px;}
.chart-box{background:#1e293b;padding:20px;border-radius:10px;}
.card{background:#1e293b;padding:20px;margin:12px 0;border-radius:12px;border:2px solid transparent;}
.checked-card{border:2px solid #22c55e;}
.rank{color:#facc15;font-weight:bold;}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
.view{background:#3b82f6;color:#fff;}
.check{background:#22c55e;color:#fff;}
.delete{background:#ef4444;color:#fff;}
.search-box{margin-bottom:15px;}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>

  <div class="group-title">主功能</div>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
  <button onclick="showPage('checked')">✔ 已標記</button>

  <div class="group-title">工具</div>
  <button onclick="exportData()">📤 匯出資料</button>
</div>

<div class="main">

  <div id="dashboard">
    <h1>Dashboard</h1>

    <div class="stats">
      <div class="stat">總筆數：<span id="total"></span></div>
      <div class="stat">已標記：<span id="checkedCount"></span></div>
      <div class="stat">未標記：<span id="uncheckedCount"></span></div>
      <div class="stat">平均指數：<span id="avgScore"></span></div>
    </div>

    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div id="listPage" style="display:none;">
    <h1>排行榜</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜尋商品名 / 店名..." oninput="applySearch()">
    </div>

    <div id="list"></div>
  </div>

</div>

<script>

const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

let items = [];
let chart;
let currentPage = "list";

function parseNum(str){
  if(!str) return 0;
  str = str.replace(/,/g,"");
  if(str.includes("萬")) return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

function sortByScore(arr){
  return arr.sort((a,b)=>b.score - a.score);
}

function showPage(page){

  currentPage = page;

  document.getElementById("dashboard").style.display = "none";
  document.getElementById("listPage").style.display = "none";

  const title = document.querySelector("#listPage h1");

  if(page==="dashboard"){
    document.getElementById("dashboard").style.display = "block";
  }

  if(page==="list"){
    document.getElementById("listPage").style.display = "block";
    title.innerText = "排行榜（未標記）";
    applySearch();
  }

  if(page==="checked"){
    document.getElementById("listPage").style.display = "block";
    title.innerText = "已標記";
    applySearch();
  }
}

function applySearch(){

  let keyword = document.getElementById("searchInput").value.toLowerCase();

  let base = currentPage==="checked"
    ? items.filter(i=>i.checked)
    : items.filter(i=>!i.checked);

  const filtered = base.filter(i =>
    i.title.toLowerCase().includes(keyword) ||
    i.shop.toLowerCase().includes(keyword)
  );

  render(sortByScore(filtered));
}

function render(data){

  let html = "";

  data.forEach((item,i)=>{

    const percent = ((item.score/(data[0]?.score||1))*100).toFixed(0);

    html += `
    <div class="card ${item.checked ? 'checked-card' : ''}">
      <div class="rank">#${i+1}</div>
      <div>商品名：${item.title}</div>
      <div>店名：${item.shop}</div>
      <div>銷量：${item.sold}</div>
      <div>粉絲數：${item.fans}</div>
      <div>登記公司：${item.company || "無"}</div>
      <div>統編：${item.id || "無"}</div>
      <div><b>侵權指數：${percent}%</b></div>

      <div style="margin-top:10px;display:flex;gap:10px;">
        <button class="view" onclick="openUrl('${item.url}')">查看</button>
        <button class="check" onclick="toggleCheck('${item.docId}')">
          ${item.checked ? '取消標記' : '✔標記'}
        </button>
        <button class="delete" onclick="deleteItem('${item.docId}')">刪除</button>
      </div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function openUrl(url){
  window.open(url, "_blank");
}

async function toggleCheck(docId){
  const item = items.find(i => i.docId === docId);
  const newValue = !item.checked;

  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}?updateMask.fieldPaths=checked`,
    {
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        fields:{ checked:{ booleanValue:newValue } }
      })
    }
  );

  item.checked = newValue;
  applySearch();
}

async function deleteItem(docId){
  if(!confirm("確定刪除？")) return;

  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}`,
    { method:"DELETE" }
  );

  loadData();
}

function exportData(){

  let data = currentPage==="checked"
    ? items.filter(i=>i.checked)
    : items.filter(i=>!i.checked);

  const keyword = document.getElementById("searchInput")?.value.toLowerCase() || "";

  if(keyword){
    data = data.filter(i =>
      i.title.toLowerCase().includes(keyword) ||
      i.shop.toLowerCase().includes(keyword)
    );
  }

  data = sortByScore(data);

  const header = ["商品名","店名","銷量","粉絲","公司","統編","狀態","商品連結"];

  const rows = data.map(i=>[
    i.title,i.shop,i.sold,i.fans,i.company,i.id,
    i.checked ? "已標記" : "未標記",
    i.url
  ]);

  const csv = [header, ...rows].map(r=>r.join(",")).join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);

  const d = new Date();
  a.download = `shopee_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}.csv`;

  a.click();
}

async function loadData(){

  const res = await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`
  );

  const data = await res.json();

  items = data.documents.map(doc=>{
    const f = doc.fields;
    const docId = doc.name.split('/').pop();

    return {
      docId,
      title: f.title?.stringValue||"",
      shop: f.shop?.stringValue||"",
      sold: f.sold?.stringValue||"0",
      fans: f.fans?.stringValue||"0",
      company: f.company?.stringValue||"",
      id: f.taxId?.stringValue||"",
      url: f.url?.stringValue||"",
      checked: f.checked?.booleanValue||false,
      score: parseNum(f.sold?.stringValue||"0")*0.7 + parseNum(f.fans?.stringValue||"0")*0.3
    };
  });

  document.getElementById("total").innerText = items.length;
  document.getElementById("checkedCount").innerText = items.filter(i=>i.checked).length;
  document.getElementById("uncheckedCount").innerText = items.filter(i=>!i.checked).length;

  const avg = items.reduce((a,b)=>a+b.score,0)/items.length;
  document.getElementById("avgScore").innerText = avg.toFixed(0);

  renderChart();
}

function renderChart(){
  const ranges=[0,0,0,0,0];
  items.forEach(item=>{
    let p=(item.score/items[0].score)*100;
    if(p<=20)ranges[0]++;else if(p<=40)ranges[1]++;else if(p<=60)ranges[2]++;else if(p<=80)ranges[3]++;else ranges[4]++;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:["0-20%","20-40%","40-60%","60-80%","80-100%"],
      datasets:[{label:'侵權風險分布',data:ranges}]
    }
  });
}

loadData();

</script>

</body>
</html>
