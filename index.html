<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}
.sidebar{width:240px;background:#020617;height:100vh;padding:20px;}
.sidebar button{width:100%;margin:6px 0;padding:12px;background:#0f172a;border:none;color:#94a3b8;border-radius:8px;cursor:pointer;}
.sidebar button:hover{background:#1e293b;color:#fff;}
.main{flex:1;padding:20px;}
.card{background:#1e293b;padding:20px;margin:10px 0;border-radius:10px;}
.rank{color:#facc15;font-weight:bold;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>
  <button onclick="loadData()">刷新資料</button>
</div>

<div class="main">
  <h1>排行榜</h1>
  <div id="list"></div>
</div>

<script>

let items = [];

// ⭐ 你的試算表 ID（我幫你抓好了）
const SHEET_ID = "1-oQQ4gEThHOcZKq2VlSnsv0lll1JVXrcjChKweCz5o8";

// ⭐ Google Sheet JSON API
const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

function parseNum(str){
  if(!str) return 0;
  str = String(str).replace(/,/g,"");
  if(str.includes("萬")) return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

async function loadData(){

  const res = await fetch(API_URL);
  const data = await res.json();

  items = data.map(row => {

    return {
      id: row.ID,
      title: row.商品,
      shop: row.店名,
      sold: row.銷量,
      fans: row.粉絲,
      score: parseNum(row.銷量)*0.7 + parseNum(row.粉絲)*0.3
    };

  });

  items.sort((a,b)=>b.score - a.score);

  render();
}

function render(){

  let html = "";

  items.forEach((item,i)=>{

    html += `
    <div class="card">
      <div class="rank">#${i+1}</div>
      <div>商品：${item.title}</div>
      <div>店名：${item.shop}</div>
      <div>銷量：${item.sold}</div>
      <div>粉絲：${item.fans}</div>
    </div>
    `;

  });

  document.getElementById("list").innerHTML = html;
}

loadData();

</script>

</body>
</html>
