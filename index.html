<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;

  display:flex; /* ✅ 保留 */
}

/* ✅ 關鍵修正：sidebar 不再亂動 */
.sidebar{
  width:240px;
  min-width:240px; /* ⭐ 防止被壓縮 */
  background:#020617;
  height:100vh;
  padding:20px;

  position:sticky;   /* ⭐ 核心 */
  top:0;
}

.sidebar h2{margin-bottom:20px;}
.group-title{margin-top:20px;margin-bottom:8px;font-size:12px;color:#64748b;}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:12px;
  background:#0f172a;
  border:none;
  color:#94a3b8;
  border-radius:8px;
  cursor:pointer;
  text-align:left;
}

.sidebar button:hover{
  background:#1e293b;
  color:#fff;
}

/* ✅ 主內容正常撐開 */
.main{
  flex:1;
  padding:20px;

  overflow-x:hidden; /* ⭐ 防止擠壓 */
}

.stats{display:flex;gap:15px;margin-bottom:20px;}

.stat,.chart-box,.card{
  background:#1e293b;
  border-radius:10px;
}

.stat{
  padding:20px;
  flex:1;
}

.chart-box{
  padding:20px;
}

.card{
  padding:20px;
  margin:12px 0;
  border:2px solid transparent;
  line-height:1.6;
}

.checked-card{border-color:#22c55e;}
.rank{color:#facc15;font-weight:bold;}

.search-box{margin-bottom:15px;}

.search-box input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.view{background:#3b82f6;color:white;}
.check{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>

  <div class="group-title">主功能</div>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
  <button onclick="showPage('checked')">✔ 已標記</button>

  <div class="group-title">工具</div>
  <button onclick="exportData()">📤 匯出已標記</button>
</div>

<div class="main">

  <!-- ❗ 以下完全照你的原始碼，不動 -->
