<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}

/* ✅ FIX: sidebar固定 */
.sidebar{
  width:240px;
  background:#020617;
  height:100vh;
  padding:20px;
  position:fixed;
  left:0;
  top:0;
}

.sidebar h2{margin-bottom:20px;}
.group-title{margin-top:20px;margin-bottom:8px;font-size:12px;color:#64748b;}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:12px;
  background:#0f172a;
  border:none;
  color:#94a3b8;
  border-radius:8px;
  cursor:pointer;
  text-align:left;
}
.sidebar button:hover{background:#1e293b;color:#fff;}

/* ✅ FIX: 主畫面偏移 */
.main{
  margin-left:240px;
  flex:1;
  padding:20px;
}

.stats{display:flex;gap:15px;margin-bottom:20px;}
.stat,.chart-box,.card{background:#1e293b;border-radius:10px;}
.stat{padding:20px;flex:1;}
.chart-box{padding:20px;}
.card{padding:20px;margin:12px 0;border:2px solid transparent;line-height:1.6;}
.checked-card{border-color:#22c55e;}
.rank{color:#facc15;font-weight:bold;}
.search-box{margin-bottom:15px;}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none;}

.view{background:#3b82f6;color:white;}
.check{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>

  <div style="margin-bottom:15px;">
    <div id="currentUser">目前使用者：未設定</div>
    <button onclick="changeUser()">🔄 切換使用者</button>
  </div>

  <div class="group-title">主功能</div>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
  <button onclick="showPage('checked')">✔ 已標記</button>
</div>

<div class="main">

<div id="dashboard">
<h1>Dashboard</h1>

<div class="stats">
<div class="stat">總筆數：<span id="total">0</span></div>
<div class="stat">已標記：<span id="checkedCount">0</span></div>
<div class="stat">未標記：<span id="uncheckedCount">0</span></div>
<div class="stat">平均指數：<span id="avg">0</span></div>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

<div id="listPage" style="display:none;">
<h1 id="listTitle">排行榜</h1>

<div class="search-box">
<input id="searchInput" placeholder="搜尋商品名 / 店名..." oninput="applySearch()">
</div>

<div id="list"></div>
</div>

</div>

<script>
const PROJECT_ID="shopeehunter-84d05";
const COLLECTION="shopee";

let items=[];
let chart=null;
let currentPage="dashboard";

/* ===== 使用者 ===== */
let currentUser="";

function initUser(){
  const saved=localStorage.getItem("shopee_user");
  if(saved){
    currentUser=saved;
  }else{
    let name=prompt("請輸入名稱：");
    currentUser=name||"未命名";
    localStorage.setItem("shopee_user",currentUser);
  }
  document.getElementById("currentUser").innerText="目前使用者："+currentUser;
}

function changeUser(){
  let name=prompt("新名稱：");
  if(!name)return;
  currentUser=name;
  localStorage.setItem("shopee_user",name);
  document.getElementById("currentUser").innerText="目前使用者："+name;
}

/* ===== 核心 ===== */

function parseNum(str){
  if(!str)return 0;
  str=String(str).replace(/,/g,"");
  if(str.includes("萬"))return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

function showPage(page){
  currentPage=page;
  document.getElementById("dashboard").style.display="none";
  document.getElementById("listPage").style.display="none";

  if(page==="dashboard"){
    document.getElementById("dashboard").style.display="block";
    return;
  }

  document.getElementById("listPage").style.display="block";
  applySearch();
}

function applySearch(){
  const keyword=document.getElementById("searchInput").value.toLowerCase();

  let data=currentPage==="checked"
  ?items.filter(i=>i.checked)
  :items.filter(i=>!i.checked);

  if(keyword){
    data=data.filter(i=>i.title.toLowerCase().includes(keyword)||i.shop.toLowerCase().includes(keyword));
  }

  renderList(data);
}

function renderList(data){
  let html="";
  data.forEach((item,i)=>{
    html+=`
    <div class="card ${item.checked?'checked-card':''}">
      <div class="rank">#${i+1}</div>
      <div>${item.title}</div>
      <div>${item.shop}</div>

      <button class="check" onclick="toggleCheck('${item.docId}')">
      ${item.checked?'取消':'✔標記'}
      </button>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
}

/* ===== ⭐ 重點：寫入試算表 ===== */
async function toggleCheck(docId){

  const item=items.find(i=>i.docId===docId);
  const newValue=!item.checked;

  item.checked=newValue;

  if(newValue){

    fetch("https://script.google.com/macros/s/AKfycbzVsVpAH-ZMJhq8CamtNhIcRlguUM6WjyH2BLS7Y1TmP_JWj3bOlN7T19ddhlIaSzaq/exec",{
      method:"POST",
      body:JSON.stringify({
        title:item.title,
        url:item.url,
        shop:item.shop,
        fans:item.fans,
        company:item.company,
        taxId:item.taxId,
        sold:item.sold,
        user:currentUser
      })
    })
    .then(()=>alert("✅ 已寫入試算表"))
    .catch(()=>alert("❌ 寫入失敗"));
  }

  renderDashboard();
  applySearch();
}

/* ===== 測試資料（避免空） ===== */
items=[
  {docId:"1",title:"測試商品",shop:"測試店",checked:false}
];

function renderDashboard(){}

initUser();
renderList(items);

</script>

</body>
</html>
