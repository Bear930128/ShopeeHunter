<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}
.sidebar{
  width:220px;
  background:#020617;
  height:100vh;
  padding:20px;
}
.sidebar h2{margin-bottom:20px;}
.sidebar button{
  width:100%;
  margin:6px 0;
  padding:12px;
  background:#0f172a;
  border:none;
  color:#94a3b8;
  border-radius:8px;
  cursor:pointer;
}
.sidebar button:hover{
  background:#1e293b;
  color:#fff;
}

.main{flex:1;padding:20px;}

.stats{display:flex;gap:15px;margin-bottom:20px;}
.card{background:#1e293b;padding:20px;border-radius:10px;flex:1;}
.chart-box{background:#1e293b;padding:20px;border-radius:10px;}

.item{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
.checked{border:2px solid #22c55e;}
</style>
</head>

<body>

<!-- ⭐ Sidebar -->
<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>

  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
  <button onclick="showPage('checked')">✔ 已標記</button>
</div>

<!-- ⭐ 主畫面 -->
<div class="main">

  <!-- Dashboard -->
  <div id="dashboard">
    <h1>Dashboard</h1>

    <div class="stats">
      <div class="card">總筆數：<span id="total"></span></div>
      <div class="card">已標記：<span id="checkedCount"></span></div>
      <div class="card">未標記：<span id="uncheckedCount"></span></div>
      <div class="card">平均指數：<span id="avg"></span></div>
    </div>

    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- 列表頁 -->
  <div id="listPage" style="display:none;">
    <h1 id="listTitle"></h1>
    <div id="list"></div>
  </div>

</div>

<script>

const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

let items = [];
let chart;

/* ⭐ 切頁 */
function showPage(page){

  document.getElementById("dashboard").style.display="none";
  document.getElementById("listPage").style.display="none";

  if(page==="dashboard"){
    document.getElementById("dashboard").style.display="block";
  }

  if(page==="list"){
    document.getElementById("listPage").style.display="block";
    document.getElementById("listTitle").innerText="排行榜（未標記）";
    renderList(items.filter(i=>!i.checked));
  }

  if(page==="checked"){
    document.getElementById("listPage").style.display="block";
    document.getElementById("listTitle").innerText="已標記";
    renderList(items.filter(i=>i.checked));
  }
}

/* ⭐ 數字 */
function parseNum(str){
  if(!str) return 0;
  str = str.replace(/,/g,"");
  if(str.includes("萬")) return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

/* ⭐ 載入資料 */
async function loadData(){

  const res = await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`
  );

  const data = await res.json();

  if(!data.documents) return;

  items = data.documents.map(doc=>{
    const f = doc.fields;

    const sold = f.sold?.stringValue||"0";
    const fans = f.fans?.stringValue||"0";

    return {
      title:f.title?.stringValue||"",
      checked:f.checked?.booleanValue||false,
      sold,
      fans,
      score: parseNum(sold)*0.7 + parseNum(fans)*0.3
    };
  });

  renderDashboard();
}

/* ⭐ Dashboard */
function renderDashboard(){

  const total = items.length;
  const checked = items.filter(i=>i.checked).length;
  const unchecked = total - checked;

  const avg = total
    ? items.reduce((a,b)=>a+b.score,0)/total
    : 0;

  document.getElementById("total").innerText = total;
  document.getElementById("checkedCount").innerText = checked;
  document.getElementById("uncheckedCount").innerText = unchecked;
  document.getElementById("avg").innerText = avg.toFixed(0);

  renderChart();
}

/* ⭐ 圖表 */
function renderChart(){

  const ranges=[0,0,0,0,0];

  items.forEach(i=>{
    let p=i.score;
    if(p<=20)ranges[0]++;
    else if(p<=40)ranges[1]++;
    else if(p<=60)ranges[2]++;
    else if(p<=80)ranges[3]++;
    else ranges[4]++;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:["0-20","20-40","40-60","60-80","80-100"],
      datasets:[{
        label:"侵權分布",
        data:ranges
      }]
    }
  });
}

/* ⭐ 列表 */
function renderList(data){

  let html="";

  data.sort((a,b)=>b.score-a.score);

  data.forEach((i,idx)=>{
    html += `
      <div class="item ${i.checked?'checked':''}">
        <div>#${idx+1}</div>
        <div>${i.title}</div>
        <div>指數：${i.score.toFixed(0)}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadData();

</script>

</body>
</html>
