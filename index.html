<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}
.sidebar{width:240px;background:#020617;height:100vh;padding:20px;}
.sidebar h2{margin-bottom:20px;}
.sidebar button{width:100%;margin:6px 0;padding:12px;background:#0f172a;border:none;color:#94a3b8;border-radius:8px;cursor:pointer;text-align:left;}
.sidebar button:hover{background:#1e293b;color:#fff;}
.main{flex:1;padding:20px;}
.stats{display:flex;gap:15px;margin-bottom:20px;}
.stat,.chart-box,.card{background:#1e293b;border-radius:10px;}
.stat{padding:20px;flex:1;}
.chart-box{padding:20px;}
.card{padding:20px;margin:12px 0;border-radius:10px;}
.rank{color:#facc15;font-weight:bold;}
.search-box{margin-bottom:15px;}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none;}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
.delete{background:#ef4444;color:white;}
.view{background:#3b82f6;color:white;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
</div>

<div class="main">

  <div id="dashboard">
    <h1>Dashboard</h1>
    <div class="stats">
      <div class="stat">總筆數：<span id="total">0</span></div>
      <div class="stat">平均指數：<span id="avg">0</span></div>
    </div>
    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div id="listPage" style="display:none;">
    <h1>排行榜</h1>

    <div class="search-box">
      <input id="searchInput" placeholder="搜尋商品名 / 店名..." oninput="applySearch()">
    </div>

    <div id="list"></div>
  </div>

</div>

<script>

let items = [];
let chart = null;
let currentPage = "dashboard";

// ⭐ 試算表 API
const API_URL = "https://opensheet.elk.sh/1-oQQ4gEThHOcZKq2VlSnsv0lll1JVXrcjChKweCz5o8/Sheet1";

// ⭐ GAS（你的）
const GAS_URL = "https://script.google.com/macros/s/AKfycbxTn6fVF8lQbEk7HyfEU96G8yqPXYgX7TGVVcxNMpe4v92uhD4WGBEjduWJweEAGjxD4g/exec";

function parseNum(str){
  if(!str) return 0;
  str = String(str).replace(/,/g,"").trim();
  if(str.includes("萬")) return parseFloat(str)*10000 || 0;
  return parseFloat(str) || 0;
}

function showPage(page){
  currentPage = page;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("listPage").style.display="none";

  if(page==="dashboard"){
    document.getElementById("dashboard").style.display="block";
    return;
  }

  document.getElementById("listPage").style.display="block";
  applySearch();
}

function applySearch(){
  const keyword=document.getElementById("searchInput").value.toLowerCase();

  let data = items;

  if(keyword){
    data=data.filter(i=>
      i.title.toLowerCase().includes(keyword) ||
      i.shop.toLowerCase().includes(keyword)
    );
  }

  renderList(data);
}

function renderList(data){

  let html="";

  if(data.length===0){
    html = "<div class='card'>目前沒有資料</div>";
  }else{

    const maxScore = data[0]?.score || 1;

    data.forEach((item,i)=>{
      const percent=((item.score/maxScore)*100).toFixed(0);

      html += `
      <div class="card">
        <div class="rank">#${i+1}</div>
        <div>商品名：${item.title}</div>
        <div>店名：${item.shop}</div>
        <div>銷量：${item.sold}</div>
        <div>粉絲數：${item.fans}</div>
        <div><b>侵權指數：${percent}%</b></div>

        <div style="margin-top:10px;display:flex;gap:10px;">
          <button class="view" onclick="window.open('${item.url}','_blank')">查看</button>
          <button class="delete" onclick="deleteItem('${item.id}')">刪除</button>
        </div>
      </div>`;
    });

  }

  document.getElementById("list").innerHTML=html;
}

function renderDashboard(){

  const total = items.length;
  const avg = total ? items.reduce((a,b)=>a+b.score,0)/total : 0;

  document.getElementById("total").innerText=total;
  document.getElementById("avg").innerText=avg.toFixed(0);

  renderChart();
}

function renderChart(){

  const ranges=[0,0,0,0,0];
  const maxScore=Math.max(...items.map(i=>i.score),1);

  items.forEach(item=>{
    const p=(item.score/maxScore)*100;
    if(p<=20)ranges[0]++;
    else if(p<=40)ranges[1]++;
    else if(p<=60)ranges[2]++;
    else if(p<=80)ranges[3]++;
    else ranges[4]++;
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["0-20","20-40","40-60","60-80","80-100"],
      datasets:[{label:"侵權分布",data:ranges}]
    }
  });
}

async function loadData(){

  const res = await fetch(API_URL);
  const data = await res.json();

  items = data.map(row => ({
    id: row.ID,
    title: row.商品 || "",
    shop: row.店名 || "",
    sold: row.銷量 || "0",
    fans: row.粉絲 || "0",
    url: row.URL || "",
    score: parseNum(row.銷量)*0.7 + parseNum(row.粉絲)*0.3
  }));

  items.sort((a,b)=>b.score-a.score);

  renderDashboard();
  applySearch();
}

async function deleteItem(id){

  if(!confirm("確定要刪除這筆資料嗎？")) return;

  try{

    const res = await fetch(GAS_URL + "?action=delete&id=" + id);
    const text = await res.text();

    if(text.includes("deleted")){
      items = items.filter(i => i.id !== id);
      renderDashboard();
      applySearch();
      alert("✅ 已刪除");
    }else{
      alert("❌ 刪除失敗：" + text);
    }

  }catch(e){
    console.log(e);
    alert("❌ 刪除失敗");
  }
}

loadData();

</script>

</body>
</html>
