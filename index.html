<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter 蝦皮蒐證系統</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.sidebar{
width:220px;height:100vh;background:#111827;
position:fixed;padding:20px;
}
.sidebar h2{margin-bottom:20px;}
.sidebar button{
width:100%;margin:10px 0;padding:10px;
background:#1f2937;color:white;border:none;cursor:pointer;
}
.main{margin-left:240px;padding:20px;}

.card{
background:#1f2937;padding:15px;margin:10px 0;
border-radius:10px;
}

.checked{
border:2px solid red;
background:#2a1a1a;
}

.stats{
display:flex;gap:20px;margin-bottom:20px;
}
.stat{
background:#1f2937;padding:15px;border-radius:10px;
flex:1;text-align:center;
}

.bar{
height:10px;background:#1f2937;border-radius:5px;
margin:5px 0;
}
.bar-fill{
height:10px;background:#3b82f6;border-radius:5px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>ShopeeHunter</h2>
<button onclick="showPage('home')">首頁</button>
<button onclick="showPage('list')">資料列表</button>
<button onclick="showPage('ranking')">排行榜</button>
<button onclick="showPage('add')">新增資料</button>
</div>

<div class="main">

<!-- 首頁 -->
<div id="home">
<h1>儀表板</h1>

<div class="stats">
<div class="stat">總資料<br><h2 id="total"></h2></div>
<div class="stat">已標記<br><h2 id="checked"></h2></div>
<div class="stat">使用者數<br><h2 id="users"></h2></div>
</div>

<h2>Top 5 店家</h2>
<div id="chart"></div>

</div>

<!-- 列表 -->
<div id="list" style="display:none;">
<h1>資料列表</h1>
<div id="listData"></div>
</div>

<!-- 排行榜 -->
<div id="ranking" style="display:none;">
<h1>排行榜</h1>
<div id="rankData"></div>
</div>

<!-- 新增 -->
<div id="add" style="display:none;">
<h1>新增資料</h1>

<input id="title" placeholder="商品名稱"><br><br>
<input id="shop" placeholder="店名"><br><br>
<input id="sales" placeholder="銷量"><br><br>
<input id="fans" placeholder="粉絲數"><br><br>
<input id="company" placeholder="登記公司"><br><br>
<input id="businessNo" placeholder="統編"><br><br>
<input id="url" placeholder="商品網址"><br><br>

<button onclick="addData()">新增</button>

</div>

</div>

<script>

let user = localStorage.getItem("user")
if(!user){
user = prompt("輸入使用者名稱")
localStorage.setItem("user",user)
}

let data = JSON.parse(localStorage.getItem("data")||"[]")

function calcScore(d){
return d.sales*0.7 + d.fans*0.3
}

function showPage(p){
["home","list","add","ranking"].forEach(id=>{
document.getElementById(id).style.display="none"
})
document.getElementById(p).style.display="block"
render()
}

function addData(){

let obj={
title:title.value,
shop:shop.value,
sales:Number(sales.value),
fans:Number(fans.value),
company:company.value,
businessNo:businessNo.value,
url:url.value,
checked:false,
user:user
}

if(data.find(d=>d.url===obj.url)){
alert("已存在")
return
}

data.push(obj)
localStorage.setItem("data",JSON.stringify(data))
alert("新增成功")
}

function render(){

// stats
total.innerText=data.length
checked.innerText=data.filter(d=>d.checked).length
users.innerText=[...new Set(data.map(d=>d.user))].length

// list
let html=""
data.forEach((d,i)=>{
html+=`
<div class="card ${d.checked?"checked":""}">
<b>${d.title}</b><br>
店名:${d.shop}<br>
銷量:${d.sales}｜粉絲:${d.fans}<br>
公司:${d.company||"無"}<br>
統編:${d.businessNo||"無"}<br>
使用者:${d.user}<br><br>

<button onclick="toggleCheck(${i})">標記</button>
<button onclick="deleteData(${i})">刪除</button>
<button onclick="window.open('${d.url}')">查看</button>

</div>`
})
listData.innerHTML=html

// ranking
let sorted=[...data].sort((a,b)=>calcScore(b)-calcScore(a))
let rankHTML=""
sorted.forEach((d,i)=>{
rankHTML+=`
<div class="card">
#${i+1} ${d.shop}<br>
指數:${calcScore(d).toFixed(0)}
</div>`
})
rankData.innerHTML=rankHTML

// chart
let chartHTML=""
sorted.slice(0,5).forEach(d=>{
let width=Math.min(calcScore(d)/10,100)
chartHTML+=`
${d.shop}
<div class="bar"><div class="bar-fill" style="width:${width}%"></div></div>`
})
chart.innerHTML=chartHTML

}

function deleteData(i){
if(confirm("確定刪除?")){
data.splice(i,1)
localStorage.setItem("data",JSON.stringify(data))
render()
}
}

function toggleCheck(i){
data[i].checked=!data[i].checked
localStorage.setItem("data",JSON.stringify(data))
render()
}

render()

</script>

</body>
</html>
