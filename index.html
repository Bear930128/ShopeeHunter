<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>ShopeeHunter</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2a;
      color: white;
      display: flex;
    }
    .sidebar {
      width: 200px;
      background: #0f243a;
      padding: 20px;
    }
    .sidebar button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #1c3555;
      color: white;
      border: none;
      cursor: pointer;
    }
    .main {
      flex: 1;
      padding: 20px;
    }
    .card {
      background: #162b44;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>ShopeeHunter</h2>
  <button onclick="addTestData()">🔥 測試寫入</button>
</div>

<div class="main">
  <h1>首頁</h1>
  <p>點左邊按鈕測試 Firebase</p>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDoUbN01D5ds6aSww_8LYvXlcS6nA6rBic",
    authDomain: "shopeehunter-84d05.firebaseapp.com",
    projectId: "shopeehunter-84d05",
    storageBucket: "shopeehunter-84d05.firebasestorage.app",
    messagingSenderId: "1047005043624",
    appId: "1:1047005043624:web:9c7e34c2896cd5afdfdb9d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function addTestData() {
    try {
      await addDoc(collection(db, "test"), {
        name: "測試資料",
        time: new Date()
      });
      alert("寫入成功！");
    } catch (e) {
      alert("錯誤：" + e);
    }
  }

  window.addTestData = addTestData;
</script>

</body>
</html>
