<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}

/* ✅ sidebar 固定 */
.sidebar{
  width:240px;
  background:#020617;
  height:100vh;
  padding:20px;

  position:fixed;
  left:0;
  top:0;
  z-index:1000;
}

.sidebar h2{margin-bottom:20px;}
.group-title{margin-top:20px;margin-bottom:8px;font-size:12px;color:#64748b;}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:12px;
  background:#0f172a;
  border:none;
  color:#94a3b8;
  border-radius:8px;
  cursor:pointer;
  text-align:left;
}

.sidebar button:hover{
  background:#1e293b;
  color:#fff;
}

/* ✅ ⭐ 核心修正：強制主區塊為正常區塊流 */
.main{
  display:block;
  margin-left:240px;
  padding:20px;
}

/* ⭐ 防止內容撐爆 */
.main *{
  max-width:100%;
  box-sizing:border-box;
}

.stats{
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.stat,.chart-box,.card{
  background:#1e293b;
  border-radius:10px;
}

.stat{
  padding:20px;
  flex:1;
}

.chart-box{
  padding:20px;
}

.card{
  padding:20px;
  margin:12px 0;
  border:2px solid transparent;
  line-height:1.6;
}

.checked-card{border-color:#22c55e;}
.rank{color:#facc15;font-weight:bold;}

.search-box{margin-bottom:15px;}

.search-box input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.view{background:#3b82f6;color:white;}
.check{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>

  <div class="group-title">主功能</div>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
  <button onclick="showPage('checked')">✔ 已標記</button>

  <div class="group-title">工具</div>
  <button onclick="exportData()">📤 匯出已標記</button>
</div>

<div class="main">

  <!-- 下面完全不動（你的流程） -->

  <div id="dashboard">
    <h1>Dashboard</h1>

    <div class="stats">
      <div class="stat">總筆數：<span id="total">0</span></div>
      <div class="stat">已標記：<span id="checkedCount">0</span></div>
      <div class="stat">未標記：<span id="uncheckedCount">0</span></div>
      <div class="stat">平均指數：<span id="avg">0</span></div>
    </div>

    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div id="listPage" style="display:none;">
    <h1 id="listTitle">排行榜</h1>

    <div class="search-box">
      <input id="searchInput" placeholder="搜尋商品名 / 店名..." oninput="applySearch()">
    </div>

    <div id="list"></div>
  </div>

</div>

<!-- ⚠️ JS 完全不動（你原本的全部保留） -->

</body>
</html>
