<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter 排行榜</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h1{text-align:center;}
.controls{text-align:center;margin-bottom:20px;}
button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.active{background:#facc15;}
input{
  padding:8px;
  width:60%;
  max-width:300px;
  border-radius:6px;
  border:none;
  margin-bottom:10px;
}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:2px solid transparent;
  transition:0.3s;
}
.rank{font-size:20px;color:#facc15;}

.link-btn{background:#38bdf8;}
.delete-btn{background:#ef4444;}
.check-btn{background:#22c55e;}

/* ⭐ 重點：標記效果 */
.checked{
  border:2px solid #22c55e;
  box-shadow:0 0 10px #22c55e;
}
</style>

</head>
<body>

<h1>🔥 ShopeeHunter 排行榜</h1>

<div class="controls">
  <input type="text" id="search" placeholder="搜尋商品或店名..." oninput="render()"><br>
  <button onclick="setSort('score')" id="btn-score">侵權指數</button>
  <button onclick="setSort('sold')" id="btn-sold">銷量</button>
  <button onclick="setSort('fans')" id="btn-fans">粉絲</button>
</div>

<div id="list">載入中...</div>

<script>
const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

let items = [];
let sortMode = "score";

function parseNum(str){
  if(!str) return 0;
  str = str.replace(/,/g,"");
  if(str.includes("萬")) return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

function setSort(mode){
  sortMode = mode;
  render();
}

function openLink(url){
  window.open(url, "_blank");
}

async function deleteItem(name){
  if(!confirm("確定要刪除？")) return;

  await fetch(`https://firestore.googleapis.com/v1/${name}`,{
    method:"DELETE"
  });

  alert("已刪除");
  loadData();
}

async function toggleCheck(name,checked){
  await fetch(`https://firestore.googleapis.com/v1/${name}?updateMask.fieldPaths=checked`,{
    method:"PATCH",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      fields:{
        checked:{ booleanValue: !checked }
      }
    })
  });

  loadData();
}

function render(){

  let keyword = document.getElementById("search").value.toLowerCase();

  let filtered = items.filter(item=>{
    return item.title.toLowerCase().includes(keyword) ||
           item.shop.toLowerCase().includes(keyword);
  });

  let sorted = [...filtered];

  if(sortMode==="score") sorted.sort((a,b)=>b.score-a.score);
  if(sortMode==="sold") sorted.sort((a,b)=>parseNum(b.sold)-parseNum(a.sold));
  if(sortMode==="fans") sorted.sort((a,b)=>parseNum(b.fans)-parseNum(a.fans));

  const maxScore = sorted[0]?.score||1;

  let html="";

  sorted.forEach((item,i)=>{
    const percent=((item.score/maxScore)*100).toFixed(0);

    html+=`
    <div class="card ${item.checked ? 'checked':''}">
      <div class="rank">#${i+1}</div>
      <div>商品：${item.title}</div>
      <div>店名：${item.shop}</div>
      <div>銷量：${item.sold}</div>
      <div>粉絲：${item.fans}</div>
      <div>侵權指數：${percent}%</div>

      <button class="link-btn" onclick="openLink('${item.url}')">🔍 查看</button>
      <button class="check-btn" onclick="toggleCheck('${item.name}', ${item.checked})">
        ${item.checked ? "❌ 取消" : "✔ 標記"}
      </button>
      <button class="delete-btn" onclick="deleteItem('${item.name}')">🗑 刪除</button>
    </div>
    `;
  });

  document.getElementById("list").innerHTML=html;

  document.getElementById("btn-score").classList.remove("active");
  document.getElementById("btn-sold").classList.remove("active");
  document.getElementById("btn-fans").classList.remove("active");
  document.getElementById("btn-"+sortMode).classList.add("active");
}

async function loadData(){

  const res = await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`
  );

  const data = await res.json();

  if(!data.documents){
    document.getElementById("list").innerHTML="沒有資料";
    return;
  }

  items = data.documents.map(doc=>{
    const f = doc.fields;

    const sold = f.sold?.stringValue||"0";
    const fans = f.fans?.stringValue||"0";

    return {
      name: doc.name,
      title: f.title?.stringValue||"",
      shop: f.shop?.stringValue||"",
      sold,
      fans,
      url: f.url?.stringValue||"",
      checked: f.checked?.booleanValue||false,
      score: parseNum(sold)*0.7 + parseNum(fans)*0.3
    };
  });

  render();
}

loadData();
</script>

</body>
</html>
