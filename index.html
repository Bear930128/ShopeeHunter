<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}
.sidebar{width:240px;background:#020617;height:100vh;padding:20px;}
.sidebar h2{margin-bottom:20px;}
.group-title{margin-top:20px;margin-bottom:8px;font-size:12px;color:#64748b;}
.sidebar button{width:100%;margin:6px 0;padding:12px;background:#0f172a;border:none;color:#94a3b8;border-radius:8px;cursor:pointer;text-align:left;}
.sidebar button:hover{background:#1e293b;color:#fff;}
.main{flex:1;padding:20px;}
.stats{display:flex;gap:15px;margin-bottom:20px;}
.stat,.chart-box,.card{background:#1e293b;border-radius:10px;}
.stat{padding:20px;flex:1;}
.chart-box{padding:20px;}
.card{padding:20px;margin:12px 0;border:2px solid transparent;}
.checked-card{border-color:#22c55e;}
.rank{color:#facc15;font-weight:bold;}
.search-box{margin-bottom:15px;}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none;}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
.view{background:#3b82f6;color:white;}
.check{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>

  <div class="group-title">主功能</div>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
  <button onclick="showPage('checked')">✔ 已標記</button>
</div>

<div class="main">

<div id="dashboard">
  <h1>Dashboard</h1>
  <div class="stats">
    <div class="stat">總筆數：<span id="total">0</span></div>
    <div class="stat">已標記：<span id="checkedCount">0</span></div>
    <div class="stat">未標記：<span id="uncheckedCount">0</span></div>
    <div class="stat">平均指數：<span id="avg">0</span></div>
  </div>
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>
</div>

<div id="listPage" style="display:none;">
  <h1 id="listTitle">排行榜</h1>
  <div class="search-box">
    <input id="searchInput" placeholder="搜尋..." oninput="applySearch()">
  </div>
  <div id="list"></div>
</div>

</div>

<script>
const PROJECT_ID="shopeehunter-84d05";
const COLLECTION="shopee";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzVsVpAH-ZMJhq8CamtNhIcRlguUM6WjyH2BLS7Y1TmP_JWj3bOlN7T19ddhlIaSzaq/exec";

const SHEETS=["鞋托架","置物架","手機架","文件盒","鏡櫃盒","翻蓋盒"];

let items=[];
let chart=null;
let currentPage="dashboard";

function parseNum(str){
  if(!str)return 0;
  str=String(str).replace(/,/g,"").trim();
  if(str.includes("萬")) return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

function showPage(p){
  currentPage=p;
  dashboard.style.display="none";
  listPage.style.display="none";

  if(p==="dashboard"){
    dashboard.style.display="block";
    return;
  }

  listPage.style.display="block";
  listTitle.innerText=p==="list"?"排行榜（未標記）":"已標記";
  applySearch();
}

function applySearch(){
  let kw=searchInput.value.toLowerCase();
  let data=currentPage==="checked"
    ?items.filter(i=>i.checked)
    :items.filter(i=>!i.checked);

  data=data.filter(i=>i.title.toLowerCase().includes(kw)||i.shop.toLowerCase().includes(kw));
  data.sort((a,b)=>b.score-a.score);

  renderList(data);
}

function renderList(data){
  let html="";
  data.forEach((item,i)=>{
    html+=`
    <div class="card ${item.checked?'checked-card':''}">
      <div class="rank">#${i+1}</div>
      <div>${item.title}</div>
      <div>店名：${item.shop}</div>
      <div>銷量：${item.sold}</div>
      <div>粉絲：${item.fans}</div>
      <div>公司：${item.company}</div>
      <div>統編：${item.taxId}</div>

      <button class="view" onclick="window.open('${item.url}')">查看</button>
      <button class="check" onclick="toggleCheck('${item.docId}')">
        ${item.checked?"取消":"✔標記"}
      </button>
      <button class="delete" onclick="deleteItem('${item.docId}')">刪除</button>
    </div>`;
  });
  list.innerHTML=html;
}

async function toggleCheck(id){
  const item=items.find(i=>i.docId===id);
  const newValue=!item.checked;

  await fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${id}?updateMask.fieldPaths=checked`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fields:{checked:{booleanValue:newValue}}})
  });

  item.checked=newValue;

  if(newValue){
    const sheet=prompt("選擇分頁:\n"+SHEETS.join("\n"),SHEETS[0]);
    if(!sheet) return;

    fetch(SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify({...item,sheet})
    })
    .then(()=>alert("✅ 已寫入 "+sheet))
    .catch(()=>alert("❌ 失敗"));
  }

  renderDashboard();
  applySearch();
}

async function deleteItem(id){
  if(!confirm("確定刪除？"))return;

  await fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${id}`,{method:"DELETE"});
  items=items.filter(i=>i.docId!==id);
  renderDashboard();
  applySearch();
}

function renderDashboard(){
  total.innerText=items.length;
  checkedCount.innerText=items.filter(i=>i.checked).length;
  uncheckedCount.innerText=items.filter(i=>!i.checked).length;
  avg.innerText=Math.round(items.reduce((a,b)=>a+b.score,0)/items.length||0);

  renderChart();
}

function renderChart(){
  if(chart)chart.destroy();
  chart=new Chart(chartCanvas,{
    type:"bar",
    data:{labels:["低","中","高"],datasets:[{data:[1,2,3]}]}
  });
}

async function loadData(){
  const res=await fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`);
  const data=await res.json();

  items=data.documents.map(doc=>{
    const f=doc.fields;
    return{
      docId:doc.name.split("/").pop(),
      title:f.title?.stringValue||"",
      shop:f.shop?.stringValue||"",
      sold:f.sold?.stringValue||"",
      fans:f.fans?.stringValue||"",
      company:f.company?.stringValue||"",
      taxId:f.taxId?.stringValue||"",
      url:f.url?.stringValue||"",
      checked:f.checked?.booleanValue||false,
      score:parseNum(f.sold?.stringValue)*0.7+parseNum(f.fans?.stringValue)*0.3
    };
  });

  renderDashboard();
}

loadData();
</script>

</body>
</html>
