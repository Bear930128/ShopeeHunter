<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopeeHunter Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#06111f;--border:#1f4f86;--blue:#2f8cff;--cyan:#58d7ff;--green:#38d996;--red:#ff4d6d;--yellow:#f7c948;--text:#eef6ff;--muted:#8db4de;--shadow:0 18px 42px rgba(0,0,0,.28)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,"Noto Sans TC",sans-serif;background:radial-gradient(circle at top left,rgba(47,140,255,.18),transparent 34%),var(--bg);color:var(--text)}
    button,input{font-family:inherit}a{color:var(--cyan)}
    .layout{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh}
    .sidebar{background:linear-gradient(180deg,#071a30,#06111f);border-right:1px solid var(--border);padding:24px 18px;position:sticky;top:0;height:100vh}
    .logo{margin-bottom:30px}.logo h1{margin:0;font-size:25px}.logo p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
    .nav{display:grid;gap:10px}.nav button{width:100%;height:44px;border:1px solid transparent;border-radius:8px;color:var(--muted);background:transparent;cursor:pointer;text-align:left;padding:0 14px;font-weight:700;font-size:15px}
    .nav button.active,.nav button:hover{color:#fff;background:rgba(47,140,255,.16);border-color:rgba(88,215,255,.28)}
    .user-box{position:absolute;left:18px;right:18px;bottom:22px;padding:14px;background:rgba(11,32,56,.8);border:1px solid rgba(88,215,255,.18);border-radius:8px;color:var(--muted);font-size:13px}
    .user-box strong{display:block;color:#fff;margin-top:6px;word-break:break-word}
    .version-badge{display:block;margin-top:10px;padding-top:10px;border-top:1px solid rgba(88,215,255,.16);color:#6f96bf;font-size:12px;line-height:1.35}
    .main{padding:26px;min-width:0;min-height:100vh;background:#06111f}.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:22px}
    .page-title h2{margin:0;font-size:28px}.page-title p{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.5}
    .top-actions{display:flex;align-items:center;gap:10px}
    .refresh-btn,.danger-action{height:40px;border-radius:8px;color:#fff;cursor:pointer;font-weight:800;padding:0 16px;white-space:nowrap}
    .refresh-btn{border:1px solid rgba(88,215,255,.38);background:rgba(47,140,255,.18)}
    .danger-action{border:1px solid rgba(255,77,109,.55);background:rgba(255,77,109,.2)}
    .refresh-btn:hover{background:rgba(47,140,255,.32)}.danger-action:hover{background:rgba(255,77,109,.34)}
    .refresh-btn:disabled,.danger-action:disabled{opacity:.55;cursor:not-allowed}
    .status{padding:11px 16px;min-width:160px;text-align:center;border:1px solid var(--border);border-radius:8px;background:rgba(7,24,43,.85);color:var(--muted);font-weight:700;font-size:14px;white-space:nowrap}
    .status.ok{color:var(--green)}.status.error{color:var(--red)}
    .sync-meta{width:100%;text-align:right;color:var(--muted);font-size:12px;margin-top:-10px;margin-bottom:16px}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:18px}
    .stat,.chart-panel,.card,.empty{background:linear-gradient(180deg,rgba(15,42,73,.95),rgba(11,32,56,.95));border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow)}
    .stat{padding:18px;min-height:112px}.stat span{display:block;color:var(--muted);font-size:13px;margin-bottom:12px}.stat strong{display:block;font-size:30px;color:#fff;overflow-wrap:anywhere}
    .chart-panel{height:340px;padding:18px;margin-bottom:24px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.toolbar h3{margin:0;font-size:22px}.toolbar-actions{display:flex;gap:10px;align-items:center}
    .search,.category-select{width:min(380px,100%);height:42px;border:1px solid var(--border);border-radius:8px;background:#071426;color:#fff;outline:none;padding:0 14px}.category-select{width:180px;font-weight:800}.search:focus,.category-select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(88,215,255,.12)}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(260px,1fr));gap:14px;align-items:stretch}
    .card{position:relative;padding:16px;min-height:252px;display:grid;grid-template-rows:70px 34px 62px 38px;gap:12px}
    .product-area{min-height:70px;display:block;overflow:hidden}
    .shop-title{margin:0;padding-right:82px;font-size:22px;line-height:1.28;color:#fff;font-weight:900;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-alert-row{min-height:34px;display:flex;align-items:center;gap:8px;overflow:hidden}
    .missing-alert{position:absolute;top:14px;right:14px;height:28px;max-width:78px;display:inline-flex;align-items:center;border:1px solid rgba(255,193,7,.72);border-radius:7px;background:rgba(255,193,7,.16);color:#ffd56a;font-size:12px;font-weight:900;padding:0 9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .viewed-alert{height:30px;border:1px solid rgba(247,201,72,.55);border-radius:7px;background:rgba(247,201,72,.14);color:#ffd56a;font-size:12px;font-weight:800;display:flex;align-items:center;padding:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .data-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .data{height:62px;background:rgba(6,17,31,.68);border:1px solid rgba(88,215,255,.13);border-radius:8px;padding:9px 10px;min-width:0;display:flex;flex-direction:column;justify-content:center}
    .data span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px;white-space:nowrap}.data strong{font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .actions{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.actions button{height:38px;border:0;border-radius:8px;cursor:pointer;color:#fff;font-weight:800;font-size:13px;min-width:0}
    .view-btn{background:var(--blue)}.view-btn.viewed{background:#6b7c93}.message-btn{background:#126c9f}.mark-btn{background:#214f82}.mark-btn.marked{background:var(--yellow);color:#0b2038}.delete-btn{background:var(--red)}.restore-btn{background:var(--green);color:#062015}.edit-btn{background:#256b5f}
    .actions button:disabled{opacity:.75;cursor:not-allowed}
    .empty{grid-column:1/-1;padding:42px 20px;text-align:center;color:var(--muted);border-style:dashed;line-height:1.7}.hidden{display:none}
    .modal-mask{position:fixed;inset:0;background:rgba(3,9,17,.82);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
    .modal-mask.hidden{display:none}
    .modal{width:min(420px,100%);background:#0b2038;border:1px solid var(--border);border-radius:8px;padding:24px;box-shadow:var(--shadow)}.modal h2{margin:0 0 10px}.modal p{margin:0 0 18px;color:var(--muted);line-height:1.5}
    .modal input{width:100%;height:44px;border:1px solid var(--border);border-radius:8px;background:#071426;color:#fff;padding:0 14px;outline:none;margin-bottom:14px}.modal button{width:100%;height:42px;border:0;border-radius:8px;color:#fff;background:var(--blue);font-weight:800;cursor:pointer}.field-modal{width:min(560px,100%)}.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field-grid button{background:#174d7c}.field-grid button.cancel-field{background:#334155}
    .message-modal{width:min(680px,100%)}.message-modal textarea{width:100%;min-height:260px;resize:vertical;border:1px solid var(--border);border-radius:8px;background:#071426;color:#fff;padding:12px 14px;outline:none;line-height:1.65;margin:10px 0 14px}.message-modal .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.message-modal .secondary-btn{background:#334155}
    .app-notice{position:fixed;right:24px;bottom:24px;z-index:999999;max-width:340px;padding:14px 16px;border-radius:8px;color:#fff;font-weight:800;line-height:1.45;box-shadow:0 12px 32px rgba(0,0,0,.35);display:none}
        .mobile-panel{background:linear-gradient(180deg,rgba(15,42,73,.95),rgba(11,32,56,.95));border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
    .mobile-form{display:grid;gap:12px;max-width:760px}.mobile-form textarea{min-height:180px;resize:vertical;border:1px solid var(--border);border-radius:8px;background:#071426;color:#fff;outline:none;padding:12px 14px;line-height:1.6}.mobile-form textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(88,215,255,.12)}
    .mobile-table{width:100%;border-collapse:collapse;background:linear-gradient(180deg,rgba(15,42,73,.95),rgba(11,32,56,.95));border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow)}
    .mobile-table th,.mobile-table td{border-bottom:1px solid rgba(88,215,255,.13);padding:12px;text-align:left;vertical-align:middle}.mobile-table th{color:var(--muted);font-size:13px;background:rgba(6,17,31,.36)}.mobile-table td{color:#fff;font-size:14px}.mobile-table tr:last-child td{border-bottom:0}.url-cell{max-width:520px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cyan)}
    .pager{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px;padding:12px;border:1px solid rgba(88,215,255,.18);border-radius:8px;background:rgba(6,17,31,.36)}.pager button,.pager select{height:34px;border:1px solid var(--border);border-radius:8px;background:#0b2038;color:#fff;font-weight:800;padding:0 10px}.pager button{cursor:pointer;background:#12365f}.pager button:disabled{opacity:.45;cursor:not-allowed}.pager span{color:var(--muted);font-size:13px;font-weight:800}.mini-actions{display:flex;gap:8px}.mini-actions button,.import-btn{height:36px;border:0;border-radius:8px;cursor:pointer;color:#fff;font-weight:800;padding:0 14px}.mini-view{background:var(--blue)}.mini-view.processing{background:#6b7c93;cursor:wait}.mini-delete{background:var(--red)}.pending-status{display:inline-flex;align-items:center;gap:6px;color:var(--yellow);font-weight:800;white-space:nowrap}.pending-status.done{color:var(--green)}.pending-dot{width:7px;height:7px;border-radius:999px;background:currentColor;box-shadow:0 0 0 3px rgba(247,201,72,.16)}.import-btn{background:var(--green);color:#062015;width:max-content}.mobile-toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
    @media(max-width:1120px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(2,minmax(280px,1fr))}}
    @media(max-width:760px){.layout{grid-template-columns:190px minmax(0,1fr)}.sidebar{padding:18px 12px}.logo h1{font-size:20px}.main{padding:18px}.topbar,.toolbar{flex-direction:column;align-items:stretch}.top-actions,.toolbar-actions{align-items:stretch;flex-direction:column}.stats,.grid{grid-template-columns:1fr}.chart-panel{height:300px}.card{min-height:252px;grid-template-rows:70px 34px 62px auto}.actions{grid-template-columns:repeat(2,minmax(0,1fr))}.user-box{left:12px;right:12px}}
  </style>
</head>
<body>
  <div id="loginModal" class="modal-mask">
    <div class="modal">
      <h2>輸入使用者名稱</h2>
      <p>每次進入或重新整理網站都需要輸入，方便多人使用時辨識操作來源。</p>
      <input id="usernameInput" type="text" placeholder="例如：Amy、業務A、管理員" autocomplete="off" />
      <button id="loginBtn" type="button">進入網站</button>
    </div>
  </div>

  <div id="appNotice" class="app-notice"></div>

  <div id="messageModal" class="modal-mask hidden">
    <div class="modal message-modal">
      <h2>蝦皮聊聊訊息</h2>
      <p id="messageMeta">確認或修改內容後，可複製訊息並開啟商品頁，再點商品頁聊聊手動送出。</p>
      <textarea id="messageText"></textarea>
      <div class="modal-actions">
        <button id="copyMessageBtn" type="button">複製並開啟商品頁</button>
        <button id="closeMessageBtn" class="secondary-btn" type="button">關閉</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <h1>ShopeeHunter</h1>
        <p>Google Sheet 同步監控後台</p>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-page="dashboard" type="button">首頁</button>
        <button class="nav-btn" data-page="ranking" type="button">排行榜</button>
        <button class="nav-btn" data-page="marked" type="button">已標記</button>
        <button class="nav-btn" data-page="incomplete" type="button">資料不齊全</button>
        <button class="nav-btn" data-page="trash" type="button">垃圾桶</button>
        <button class="nav-btn" data-page="mobileImport" type="button">手機匯入資料</button>
        <button id="mobilePendingNavBtn" class="nav-btn" data-page="mobilePending" type="button">手機待確認</button>
      </nav>
      <div class="user-box">目前使用者<strong id="currentUser">尚未登入</strong><span id="versionBadge" class="version-badge">版本讀取中</span></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">首頁</h2>
          <p id="pageSubtitle">總覽目前試算表同步資料、排行榜與風險區間分布。</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="refresh-btn" type="button">刷新資料</button>
          <div id="status" class="status">等待登入</div>
        </div>
      </header>

      <section id="dashboardPage">
        <section class="stats">
          <div class="stat"><span>總筆數</span><strong id="totalCount">0</strong></div>
          <div class="stat"><span>平均指數</span><strong id="avgIndex">0</strong></div>
          <div class="stat"><span>最高銷量</span><strong id="maxSales">0</strong></div>
          <div class="stat"><span>已標記</span><strong id="markedCount">0</strong></div>
          <div class="stat"><span>資料不齊全</span><strong id="incompleteCount">0</strong></div>
        </section>
        <section class="chart-panel"><canvas id="mainChart"></canvas></section>
      </section>

      <section id="rankingPage" class="hidden">
        <div class="toolbar">
          <h3>排行榜</h3>
          <div class="toolbar-actions"><select id="categoryFilter" class="category-select"><option value="全部">全部</option><option value="鞋托架">鞋托架</option><option value="置物架">置物架</option><option value="手機架">手機架</option><option value="文件盒">文件盒</option><option value="鏡櫃盒">鏡櫃盒</option><option value="翻蓋盒">翻蓋盒</option></select><select id="completenessFilter" class="category-select"><option value="全部">全部資料</option><option value="完整">資料完整</option><option value="不齊全">資料不齊全</option></select><input id="searchInput" class="search" type="search" placeholder="搜尋店名、登記公司、統編" /></div>
        </div>
        <section id="rankingGrid" class="grid"><div class="empty">資料載入中...</div></section>
      </section>

      <section id="markedPage" class="hidden">
        <div class="toolbar">
          <h3>已標記</h3>
          <div class="toolbar-actions"><select id="markedCategoryFilter" class="category-select"><option value="全部">全部</option><option value="鞋托架">鞋托架</option><option value="置物架">置物架</option><option value="手機架">手機架</option><option value="文件盒">文件盒</option><option value="鏡櫃盒">鏡櫃盒</option><option value="翻蓋盒">翻蓋盒</option></select><select id="markedCompletenessFilter" class="category-select"><option value="全部">全部資料</option><option value="完整">資料完整</option><option value="不齊全">資料不齊全</option></select><input id="markedSearchInput" class="search" type="search" placeholder="搜尋已標記店名、登記公司、統編" /></div>
        </div>
        <section id="markedGrid" class="grid"><div class="empty">尚無已標記資料</div></section>
      </section>


      <section id="incompletePage" class="hidden">
        <div class="toolbar">
          <h3>資料不齊全</h3>
          <div class="toolbar-actions"><select id="incompleteCategoryFilter" class="category-select"><option value="全部">全部</option><option value="鞋托架">鞋托架</option><option value="置物架">置物架</option><option value="手機架">手機架</option><option value="文件盒">文件盒</option><option value="鏡櫃盒">鏡櫃盒</option><option value="翻蓋盒">翻蓋盒</option></select><input id="incompleteSearchInput" class="search" type="search" placeholder="搜尋資料不齊全店名、登記公司、統編" /></div>
        </div>
        <section id="incompleteGrid" class="grid"><div class="empty">目前沒有資料不齊全的卡片</div></section>
      </section>

      <section id="trashPage" class="hidden">
        <div class="toolbar">
          <h3>垃圾桶</h3>
          <div class="toolbar-actions">
            <input id="trashSearchInput" class="search" type="search" placeholder="搜尋垃圾桶店名、登記公司、統編" />
            <button id="bulkDeleteTrashBtn" class="danger-action" type="button">一鍵刪除</button>
          </div>
        </div>
        <section id="trashGrid" class="grid"><div class="empty">垃圾桶沒有資料</div></section>
      </section>

      <section id="mobileImportPage" class="hidden">
        <div class="toolbar">
          <h3>手機匯入資料</h3>
        </div>
        <div class="mobile-panel">
          <div class="mobile-form">
            <select id="mobileImportCategory" class="category-select">
              <option value="鞋托架">鞋托架</option>
              <option value="置物架">置物架</option>
              <option value="手機架">手機架</option>
              <option value="文件盒">文件盒</option>
              <option value="鏡櫃盒">鏡櫃盒</option>
              <option value="翻蓋盒">翻蓋盒</option>
            </select>
            <textarea id="mobileImportUrls" placeholder="請貼上蝦皮商品網址，一行一筆"></textarea>
            <button id="mobileImportBtn" class="import-btn" type="button">匯入手機資料</button>
          </div>
        </div>
      </section>

      <section id="mobilePendingPage" class="hidden">
        <div class="toolbar">
          <h3>手機待確認</h3>
          <div class="toolbar-actions">
            <select id="mobilePendingCategory" class="category-select">
              <option value="全部">全部</option>
              <option value="鞋托架">鞋托架</option>
              <option value="置物架">置物架</option>
              <option value="手機架">手機架</option>
              <option value="文件盒">文件盒</option>
              <option value="鏡櫃盒">鏡櫃盒</option>
              <option value="翻蓋盒">翻蓋盒</option>
            </select>
          </div>
        </div>
        <section id="mobilePendingList"><div class="empty">手機待確認目前沒有資料</div></section>
      </section>
    </main>
  </div>

  <script>
    const OPENSHEET_BASE_URL = "https://opensheet.elk.sh/1-oQQ4gEThHOcZKq2VlSnsv0lll1JVXrcjChKweCz5o8";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxPEwonvYIRO8Qj98t_Im1HuC04nj3N7EkfwISVMmBpIsszm0cspifUyJyyJi_K4ay3/exec";
    const PRODUCT_CATEGORIES = ["鞋托架", "置物架", "手機架", "文件盒", "鏡櫃盒", "翻蓋盒"];
    const DELETED_SHEET_NAME = "已刪除";
    const MOBILE_PENDING_SHEET_NAME = "手機待確認";
    const APP_VERSION = "v2026.06.08.1";
    const AUTO_REFRESH_MS = 30000;
    const PAGE_SIZE_KEY = "shopeeHunterPageSize";
    const PAGE_SIZE_OPTIONS = [25, 50, 100];

    let currentUser = "";
    let allItems = [];
    let chart = null;
    let isLoading = false;
    let isMutating = false;
    let autoRefreshTimer = null;
    let activeMessageItem = null;
    let pageSize = Number(localStorage.getItem(PAGE_SIZE_KEY) || 50);
    if (!PAGE_SIZE_OPTIONS.includes(pageSize)) pageSize = 50;
    const paginationState = { ranking: 1, marked: 1, incomplete: 1, trash: 1, mobilePending: 1 };
    const permanentlyDeletedIds = new Set();
    const MOBILE_PENDING_IMPORTING_KEY = "shopeeHunterMobilePendingImportingIds";
    const mobilePendingImportingIds = new Set(JSON.parse(localStorage.getItem(MOBILE_PENDING_IMPORTING_KEY) || "[]"));
    const RANKING_VIEWED_KEY = "shopeeHunterRankingViewedIds";
    const rankingViewedIds = new Set(JSON.parse(localStorage.getItem(RANKING_VIEWED_KEY) || "[]"));

    const loginModal = document.getElementById("loginModal");
    const usernameInput = document.getElementById("usernameInput");
    const loginBtn = document.getElementById("loginBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const bulkDeleteTrashBtn = document.getElementById("bulkDeleteTrashBtn");
    const currentUserEl = document.getElementById("currentUser");
    const statusEl = document.getElementById("status");
    const syncMeta = document.getElementById("syncMeta");
    const messageModal = document.getElementById("messageModal");
    const messageMeta = document.getElementById("messageMeta");
    const messageText = document.getElementById("messageText");
    const copyMessageBtn = document.getElementById("copyMessageBtn");
    const closeMessageBtn = document.getElementById("closeMessageBtn");
    const versionBadge = document.getElementById("versionBadge");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const appNotice = document.getElementById("appNotice");

    const dashboardPage = document.getElementById("dashboardPage");
    const rankingPage = document.getElementById("rankingPage");
    const markedPage = document.getElementById("markedPage");

    function textValue(value) {
      return String(value || "").trim();
    }

    function cleanKey(value) {
      return String(value || "").replace(/\uFEFF/g, "").replace(/\u00A0/g, " ").replace(/\s+/g, "").trim();
    }

    function numberValue(value) {
      let text = String(value || "").trim();
      if (!text) return 0;
      text = text.replaceAll(",", "").replaceAll("+", "").replaceAll("＋", "").replace(/\s/g, "");
      let multiplier = 1;
      if (text.includes("萬")) { multiplier = 10000; text = text.replace("萬", ""); }
      if (text.toLowerCase().includes("k")) { multiplier = 1000; text = text.toLowerCase().replace("k", ""); }
      const n = Number(text.replace(/[^\d.-]/g, ""));
      return Number.isFinite(n) ? Math.round(n * multiplier) : 0;
    }

    function displayValue(rawValue, numericValue) {
      const raw = textValue(rawValue);
      return raw || formatNumber(numericValue);
    }

    function formatNumber(value) {
      const n = Number(value) || 0;
      if (n >= 10000) {
        const v = n / 10000;
        return Number.isInteger(v) ? `${v}萬` : `${v.toFixed(1)}萬`;
      }
      return n.toLocaleString();
    }

    function normalizeRowKeys(row) {
      const normalized = {};
      Object.keys(row || {}).forEach(key => normalized[cleanKey(key)] = row[key]);
      return normalized;
    }

    function getField(row, names) {
      const normalizedRow = normalizeRowKeys(row);
      for (const name of names) {
        const cleanName = cleanKey(name);
        if (normalizedRow[cleanName] !== undefined && String(normalizedRow[cleanName]).trim() !== "") {
          return normalizedRow[cleanName];
        }
      }
      return "";
    }

    function calcIndex(sales, fans) {
      const salesScore = Math.min(sales / 100, 70);
      const fanScore = Math.min(fans / 1000, 30);
      return Math.round(Math.min(100, salesScore + fanScore));
    }

    function normalizeRow(row) {
      const id = textValue(getField(row, ["ID", "Id", "id"]));
      const url = textValue(getField(row, ["URL", "url", "網址"]));
      const product = "";
      const shop = textValue(getField(row, ["店名", "商店", "Shop", "shop"]));
      const account = textValue(getField(row, ["帳號", "賣家帳號", "Account", "account"]));
      const company = textValue(getField(row, ["登記公司", "公司", "公司名", "Company", "company"]));
      const taxId = textValue(getField(row, ["統編", "統一編號", "Tax ID", "taxId", "taxid"]));
      const shopId = textValue(getField(row, ["賣場編號", "shopId", "shopid", "Shop ID", "ShopID"]));
      const itemId = textValue(getField(row, ["商品編號", "itemId", "itemid", "Item ID", "ItemID"]));
      const status = textValue(getField(row, ["完成蒐證", "狀態", "status", "Status"]));
      const category = textValue(getField(row, ["款式", "分類", "category", "Category"]));
      const rawFans = getField(row, ["粉絲數", "粉絲", "Fans", "fans"]);
      const rawSales = getField(row, ["銷量", "銷售", "Sales", "sales"]);
      const fans = numberValue(rawFans);
      const sales = numberValue(rawSales);

      return {
        id, url,
        product: product || "未命名商品",
        shop: shop || "未命名店名",
        account,
        company: company || "無",
        taxId: taxId || "無",
        shopId,
        itemId,
        status,
        category: PRODUCT_CATEGORIES.includes(category) ? category : "未分類",
        fans, sales,
        fansDisplay: displayValue(rawFans, fans),
        salesDisplay: displayValue(rawSales, sales),
        index: calcIndex(sales, fans)
      };
    }

    function dedupeItems(items) {
      const map = new Map();
      for (const item of items) {
        const key = item.id || item.url || `${item.product}-${item.shop}`;
        if (!key) continue;
        if (!map.has(key)) {
          map.set(key, item);
          continue;
        }
        const oldItem = map.get(key);
        if (item.sales >= oldItem.sales) map.set(key, item);
      }
      return Array.from(map.values());
    }

    async function loadData(options = {}) {
      const silent = options.silent === true;

      if (!currentUser) {
        if (!silent) {
          alert("請先輸入使用者名稱。");
          usernameInput.focus();
        }
        return;
      }
      if (isLoading) return;

      isLoading = true;
      if (!silent) {
        setStatus("資料讀取中");
        refreshBtn.disabled = true;
      }

      try {
        const sheetResults = await Promise.all(PRODUCT_CATEGORIES.map(async category => {
          const url = OPENSHEET_BASE_URL + "/" + encodeURIComponent(category);
          const res = await fetch(url, { cache: "reload" });
          if (!res.ok) throw new Error(category + " OpenSheet HTTP " + res.status);
          const rows = await res.json();
          if (!Array.isArray(rows)) throw new Error(category + " 回傳格式不是陣列");
          return rows.map(row => Object.assign({}, row, { 款式: row["款式"] || category }));
        }));

        let deletedRows = [];
        const deletedRes = await fetch(OPENSHEET_BASE_URL + "/" + encodeURIComponent(DELETED_SHEET_NAME), { cache: "reload" });
        if (deletedRes.ok) {
          const rawDeletedRows = await deletedRes.json();
          if (!Array.isArray(rawDeletedRows)) throw new Error(DELETED_SHEET_NAME + " 回傳格式不是陣列");
          deletedRows = rawDeletedRows.map(row => Object.assign({}, row, { 完成蒐證: row["完成蒐證"] || "已刪除" }));
        }

        let pendingRows = [];
        const pendingRes = await fetch(OPENSHEET_BASE_URL + "/" + encodeURIComponent(MOBILE_PENDING_SHEET_NAME), { cache: "reload" });
        if (pendingRes.ok) {
          const rawPendingRows = await pendingRes.json();
          if (!Array.isArray(rawPendingRows)) throw new Error(MOBILE_PENDING_SHEET_NAME + " 回傳格式不是陣列");
          pendingRows = rawPendingRows.map(row => Object.assign({}, row, { 狀態: row["狀態"] || "手機未確認" }));
        }

        const rows = sheetResults.flat().concat(deletedRows, pendingRows);
        const normalizedItems = rows
          .map(normalizeRow)
          .filter(item => item.id && (item.shop || item.url))
          .filter(item => !permanentlyDeletedIds.has(item.id));

        if (!normalizedItems.length && rows.length) {
          const firstKeys = Object.keys(rows[0]).join("、");
          throw new Error("有讀到資料，但缺少必要欄位。請確認六個分頁第一列都有：款式、URL、店名、粉絲數、登記公司、統編、銷量、完成蒐證、ID、時間。實際欄位：" + firstKeys);
        }

        allItems = dedupeItems(normalizedItems);
        cleanupMobilePendingImportingState();
        cleanupRankingViewedState();
        renderAll();
        setStatus("資料已同步", "ok");
        setSyncTime();
      } catch (error) {
        console.error(error);
        if (!silent) {
          allItems = [];
          renderAll();
          setStatus("資料載入失敗", "error");
          const testLinks = PRODUCT_CATEGORIES.concat([DELETED_SHEET_NAME, MOBILE_PENDING_SHEET_NAME]).map(category => `<a href="${OPENSHEET_BASE_URL}/${encodeURIComponent(category)}" target="_blank" rel="noopener noreferrer">${escapeHtml(category)}</a>`).join(" ｜ ");
          const message = `<div class="empty">資料讀取失敗：${escapeHtml(error.message)}<br><br>測試 opensheet 分頁：${testLinks}</div>`;
          rankingGrid.innerHTML = message;
          markedGrid.innerHTML = message;
          incompleteGrid.innerHTML = message;
          trashGrid.innerHTML = message;
        } else {
          setStatus("自動同步失敗", "error");
        }
      } finally {
        isLoading = false;
        if (!silent) refreshBtn.disabled = false;
      }
    }

    function isMarked(item) {
      return item && item.status === "已標記";
    }

    function itemMatchesKeyword(item, keyword) {
      const target = [item.shop, item.company, item.taxId, item.category].join(" ").toLowerCase();
      return target.includes(keyword);
    }

    function matchesCompletenessFilter(item, mode) {
      if (mode === "完整") return !isIncompleteCompanyInfo(item);
      if (mode === "不齊全") return isIncompleteCompanyInfo(item);
      return true;
    }
    function resetPage(key) {
      if (paginationState[key]) paginationState[key] = 1;
    }

    function getPagedItems(key, items) {
      const total = items.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      paginationState[key] = Math.min(Math.max(Number(paginationState[key] || 1), 1), totalPages);
      const currentPage = paginationState[key];
      const start = (currentPage - 1) * pageSize;
      const end = Math.min(start + pageSize, total);
      return { items: items.slice(start, end), total, totalPages, currentPage, start, end };
    }

    function renderPager(key, page) {
      if (!page.total) return "";
      const options = PAGE_SIZE_OPTIONS.map(size => `<option value="${size}" ${size === pageSize ? "selected" : ""}>每頁 ${size} 筆</option>`).join("");
      return `
        <div class="pager">
          <button type="button" onclick="changeListPage('${key}', ${page.currentPage - 1})" ${page.currentPage <= 1 ? "disabled" : ""}>上一頁</button>
          <span>共 ${page.total.toLocaleString()} 筆，第 ${page.currentPage} / ${page.totalPages} 頁，顯示 ${page.start + 1}-${page.end}</span>
          <button type="button" onclick="changeListPage('${key}', ${page.currentPage + 1})" ${page.currentPage >= page.totalPages ? "disabled" : ""}>下一頁</button>
          <select onchange="changePageSize(this.value)">${options}</select>
        </div>
      `;
    }

    function normalizeImportUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      try {
        const parsed = new URL(raw);
        parsed.hash = "";
        ["sp_atk", "xptdk", "uls_trackid", "display_model_id", "model_id", "entry_point", "search", "source", "utm_source", "utm_medium", "utm_campaign"].forEach(param => parsed.searchParams.delete(param));
        const query = parsed.searchParams.toString();
        return (parsed.origin + parsed.pathname + (query ? "?" + query : "")).toLowerCase();
      } catch (error) {
        return raw.split("#")[0].trim().toLowerCase();
      }
    }

    function parseMobileUrls(text) {
      const rawUrls = String(text || "")
        .split(/\r?\n/)
        .map(value => value.trim())
        .filter(Boolean);
      const seen = new Set();
      const urls = [];
      let duplicateInPasteCount = 0;

      rawUrls.forEach(url => {
        const key = normalizeImportUrl(url);
        if (!key) return;
        if (seen.has(key)) {
          duplicateInPasteCount++;
          return;
        }
        seen.add(key);
        urls.push(url);
      });

      return { urls, duplicateInPasteCount, originalCount: rawUrls.length };
    }

    function filterExistingMobileUrls(urls) {
      const existingKeys = new Set(allItems.map(item => normalizeImportUrl(item.url)).filter(Boolean));
      const freshUrls = [];
      let existingCount = 0;

      urls.forEach(url => {
        const key = normalizeImportUrl(url);
        if (existingKeys.has(key)) {
          existingCount++;
          return;
        }
        freshUrls.push(url);
      });

      return { freshUrls, existingCount };
    }

    async function importMobileUrls() {
      const category = mobileImportCategory.value;
      const parsed = parseMobileUrls(mobileImportUrls.value);
      const filtered = filterExistingMobileUrls(parsed.urls);
      const urls = filtered.freshUrls;
      const frontSkippedCount = parsed.duplicateInPasteCount + filtered.existingCount;

      if (!category) {
        alert("請先選擇分類。");
        return;
      }

      if (!parsed.originalCount) {
        alert("請貼上至少一個商品網址。");
        mobileImportUrls.focus();
        return;
      }

      if (!urls.length) {
        alert(`這次貼上的 ${parsed.originalCount} 筆網址都已經存在或重複，沒有需要匯入的新資料。\n\n同批重複：${parsed.duplicateInPasteCount} 筆\n已存在資料：${filtered.existingCount} 筆`);
        mobileImportUrls.focus();
        return;
      }

      mobileImportBtn.disabled = true;
      mobileImportBtn.textContent = "匯入中";
      showAppNotice("手機資料匯入中，請稍候...", "loading");

      try {
        const body = new URLSearchParams();
        body.set("action", "mobileImport");
        body.set("category", category);
        body.set("urls", urls.join("\n"));
        body.set("user", currentUser);

        const result = await postGas(body);
        if (!result.success) throw new Error(result.message || "GAS 未回傳 success:true");

        mobileImportUrls.value = "";
        const insertedCount = Number(result.insertedCount || 0);
        const backendSkippedCount = Number(result.skippedCount || 0);
        const totalSkippedCount = frontSkippedCount + backendSkippedCount;
        showAppNotice(`手機資料匯入完成：新增 ${insertedCount} 筆，重複略過 ${totalSkippedCount} 筆`, "success");
        alert(`手機資料匯入完成\n\n新增：${insertedCount} 筆\n前端先略過：${frontSkippedCount} 筆\n後端重複略過：${backendSkippedCount} 筆`);
        await loadData();
        switchPage("mobilePending");
      } catch (error) {
        alert("手機資料匯入失敗：" + error.message);
        showAppNotice("手機資料匯入失敗", "error");
      } finally {
        mobileImportBtn.disabled = false;
        mobileImportBtn.textContent = "匯入手機資料";
      }
    }

    function openMobilePending(url, id, category) {

      markMobilePendingImporting(id);

      const params = new URLSearchParams();
      params.set("shopeeHunterPendingId", id || "");
      if (category) params.set("shopeeHunterCategory", category);
      window.open(url + separator + params.toString(), "_blank", "noopener,noreferrer");
    }

    async function deleteMobilePending(id) {
      const ok = confirm("確定要刪除這筆手機待確認資料嗎？\n\n這會直接從試算表刪除這筆線索。");
      if (!ok) return;

      showAppNotice("正在刪除手機待確認資料...", "loading");

      try {
        const body = new URLSearchParams();
        body.set("action", "deletePending");
        body.set("id", id);
        body.set("user", currentUser);

        const result = await postGas(body);
        if (!result.success) throw new Error(result.message || "GAS 未回傳 success:true");

        allItems = allItems.filter(item => item.id !== id);
        clearMobilePendingImporting(id);
        renderAll();
        showAppNotice("手機待確認資料已刪除", "success");
      } catch (error) {
        alert("刪除失敗：" + error.message);
        showAppNotice("刪除失敗", "error");
      }

    function renderAll() {
      renderStats();
      renderRanking();
      renderMarked();
      renderIncomplete();
      renderTrash();
      renderMobilePending();
      updateMobilePendingCount();
      try { renderChart(); } catch (error) { console.error(error); }
    }

    function renderStats() {
      const activeItems = allItems.filter(item => item.status !== "已刪除");
      const total = activeItems.length;
      const avg = total ? Math.round(activeItems.reduce((sum, item) => sum + item.index, 0) / total) : 0;
      const maxSalesItem = activeItems.reduce((top, item) => item.sales > top.sales ? item : top, { sales: 0, salesDisplay: "0" });

      totalCountEl.textContent = total.toLocaleString();
      avgIndexEl.textContent = avg.toLocaleString();
      maxSalesEl.textContent = maxSalesItem.salesDisplay || formatNumber(maxSalesItem.sales);
      markedCountEl.textContent = allItems.filter(item => item.status === "已標記").length.toLocaleString();
      incompleteCountEl.textContent = activeItems.filter(item => item.status !== "手機未確認" && isIncompleteCompanyInfo(item)).length.toLocaleString();
    }

    function getIndexBuckets(items) {
      const buckets = [
        { label: "0-20", min: 0, max: 20, count: 0, sales: 0 },
        { label: "21-40", min: 21, max: 40, count: 0, sales: 0 },
        { label: "41-60", min: 41, max: 60, count: 0, sales: 0 },
        { label: "61-80", min: 61, max: 80, count: 0, sales: 0 },
        { label: "81-100", min: 81, max: 100, count: 0, sales: 0 }
      ];
      for (const item of items) {
        const bucket = buckets.find(group => item.index >= group.min && item.index <= group.max);
        if (bucket) {
          bucket.count += 1;
          bucket.sales += item.sales;
        }
      }
      return buckets;
    }

    function renderChart() {
      const buckets = getIndexBuckets(allItems.filter(item => item.status !== "已刪除"));
      if (!window.Chart) return;
      if (chart) chart.destroy();

      chart = new Chart(document.getElementById("mainChart"), {
        type: "bar",
        data: {
          labels: buckets.map(bucket => bucket.label),
          datasets: [
            { label: "商品數", data: buckets.map(bucket => bucket.count), backgroundColor: "rgba(47,140,255,.68)", borderColor: "#58d7ff", borderWidth: 1, yAxisID: "y" },
            { label: "總銷量", data: buckets.map(bucket => bucket.sales), type: "line", borderColor: "#38d996", backgroundColor: "rgba(56,217,150,.12)", tension: .35, yAxisID: "y1" }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { labels: { color: "#eef6ff" } } },
          scales: {
            x: { title: { display: true, text: "侵權指數區間", color: "#8db4de" }, ticks: { color: "#8db4de" }, grid: { color: "rgba(141,180,222,.12)" } },
            y: { beginAtZero: true, title: { display: true, text: "商品數", color: "#8db4de" }, ticks: { color: "#8db4de", precision: 0 }, grid: { color: "rgba(141,180,222,.12)" } },
            y1: { beginAtZero: true, position: "right", title: { display: true, text: "總銷量", color: "#8db4de" }, ticks: { color: "#8db4de", callback(value) { return formatNumber(value); } }, grid: { drawOnChartArea: false } }
          }
        }
      });
    }

    function renderRanking() {
      const sourceItems = getRankingItems();
      const page = getPagedItems("ranking", sourceItems);
      rankingGrid.innerHTML = sourceItems.length
        ? page.items.map(item => renderCard(item, false)).join("") + renderPager("ranking", page)
        : '<div class="empty">沒有符合條件的未標記資料</div>';
    }

    function renderMarked() {
      const sourceItems = getMarkedItems();
      const page = getPagedItems("marked", sourceItems);
      markedGrid.innerHTML = sourceItems.length
        ? page.items.map(item => renderCard(item, false)).join("") + renderPager("marked", page)
        : '<div class="empty">尚無已標記資料</div>';

    function renderIncomplete() {
      const sourceItems = getIncompleteItems();

      incompleteGrid.innerHTML = sourceItems.length
        ? page.items.map(item => renderCard(item, false)).join("") + renderPager("incomplete", page)
        : '<div class="empty">目前沒有資料不齊全的卡片</div>';

    function renderTrash() {
      const sourceItems = getTrashItems();
      const page = getPagedItems("trash", sourceItems);
      trashGrid.innerHTML = sourceItems.length
        ? page.items.map(item => renderCard(item, true)).join("") + renderPager("trash", page)
        : '<div class="empty">垃圾桶沒有資料</div>';
      bulkDeleteTrashBtn.disabled = sourceItems.length === 0;

    function renderCard(item, inTrash = false) {
      const marked = isMarked(item);
      const incompleteCompany = isIncompleteCompanyInfo(item);
      const viewed = rankingViewedIds.has(item.id) && !inTrash && item.status !== "已標記" && item.status !== "已刪除" && item.status !== "手機未確認";
      const viewedWarning = viewed ? `<div class="viewed-alert">已查看，待標記</div>` : "";
      const dataWarning = incompleteCompany && !inTrash ? `<div class="missing-alert" title="資料不齊">資料不齊</div>` : "";
      const markButton = inTrash
        ? `<button class="restore-btn" type="button" onclick="restoreItem('${escapeJs(item.id)}')">復原</button>`
        : `<button class="mark-btn ${marked ? "marked" : ""}" type="button" onclick="toggleMark('${escapeJs(item.id)}')">${marked ? "已標記" : "標記"}</button>`;
      const deleteButton = inTrash
        ? ""
        : `<button class="delete-btn" type="button" onclick="deleteItem('${escapeJs(item.id)}')">刪除</button>`;
      const messageButton = inTrash
        ? ""
        : `<button class="message-btn" type="button" onclick="openMessageTemplate('${escapeJs(item.id)}')">訊息</button>`;
      const editButton = inTrash
        ? ""
        : `<button class="edit-btn" type="button" onclick="editAnyField('${escapeJs(item.id)}')">補資料</button>`;

      return `
        <article class="card" data-id="${escapeHtml(item.id)}">
          <div class="product-area">
            <h3 class="shop-title" title="${escapeHtml(item.shop)}">${escapeHtml(item.shop)}</h3>
          </div>
          <div class="card-alert-row">
            ${dataWarning}${viewedWarning}
          </div>
          <div class="data-row">
            <div class="data"><span>銷量</span><strong>${escapeHtml(item.salesDisplay)}</strong></div>
            <div class="data"><span>粉絲數</span><strong>${escapeHtml(item.fansDisplay)}</strong></div>
          </div>
          <div class="actions">
            <button class="view-btn ${viewed ? "viewed" : ""}" type="button" onclick="openProduct('${escapeJs(item.url)}', '${escapeJs(item.shop)}', '${escapeJs(item.category)}', '${escapeJs(item.id)}')" ${item.url ? "" : "disabled"}>${viewed ? "已查看" : "查看"}</button>
            ${messageButton}
            ${markButton}
            ${editButton}
            ${deleteButton}
          </div>
        </article>
      `;
    }
    function isMissingCompanyValue(value) {
      const normalized = String(value || "").trim().toLowerCase();
      return ["", "無", "未抓到", "未登記", "查無", "未知", "null", "undefined"].includes(normalized);
    }

    function isIncompleteCompanyInfo(item) {
      return isMissingCompanyValue(item && item.company) || isMissingCompanyValue(item && item.taxId);
    }

    async function chooseEditableField() {
      const editableFields = ["店名", "帳號", "粉絲數", "登記公司", "統編", "賣場編號", "商品編號", "銷量"];
      return new Promise(resolve => {
        const mask = document.createElement("div");
        mask.className = "modal-mask";
        mask.innerHTML = `
          <div class="modal field-modal">
            <h2>補資料</h2>
            <p>選擇要補的欄位。</p>
            <div class="field-grid">
              ${editableFields.map(field => `<button type="button" data-field="${escapeHtml(field)}">${escapeHtml(field)}</button>`).join("")}
              <button type="button" class="cancel-field" data-field="">取消</button>
            </div>
          </div>
        `;
        mask.querySelectorAll("button").forEach(button => {
          button.addEventListener("click", () => {
            const field = button.dataset.field || "";
            mask.remove();
            resolve(field);
          });
        });
        document.body.appendChild(mask);
      });
    }

    async function editAnyField(id) {
      const item = allItems.find(x => x.id === id);
      if (!item) {
        alert("找不到這筆資料，請重新整理後再試。");
        return;
      }

      const nextField = await chooseEditableField();
      if (!nextField) return;

      const currentMap = {
        "店名": item.shop,
        "帳號": item.account,
        "粉絲數": item.fansDisplay,
        "登記公司": isMissingCompanyValue(item.company) ? "" : item.company,
        "統編": isMissingCompanyValue(item.taxId) ? "" : item.taxId,
        "賣場編號": item.shopId,
        "商品編號": item.itemId,
        "銷量": item.salesDisplay
      };
      const value = prompt(`請輸入「${item.shop}」的「${nextField}」`, currentMap[nextField] || "");
      if (value === null) return;
      const nextValue = value.trim();
      if (!nextValue) {
        alert("補資料內容不可空白。");
        return;
      }

      showAppNotice(`正在更新${nextField}...`, "loading");
      try {
        const body = new URLSearchParams();
        body.set("action", "updateField");
        body.set("id", id);
        body.set("field", nextField);
        body.set("value", nextValue);
        body.set("user", currentUser);

        const result = await postGas(body);
        if (!result.success) throw new Error(result.message || "GAS 未回傳 success:true");

        applyFieldToLocalItem(item, nextField, nextValue);
        renderAll();
        showAppNotice(`${nextField}已更新`, "success");
      } catch (error) {
        alert("更新失敗：" + error.message);
        showAppNotice("更新失敗，請稍後再試", "error");
      }
    }

    function applyFieldToLocalItem(item, field, value) {
      if (field === "店名") item.shop = value;
      if (field === "帳號") item.account = value;
      if (field === "粉絲數") { item.fansDisplay = value; item.fans = numberValue(value); item.index = calcIndex(item.sales, item.fans); }
      if (field === "登記公司") item.company = value;
      if (field === "統編") item.taxId = value;
      if (field === "賣場編號") item.shopId = value;
      if (field === "商品編號") item.itemId = value;
      if (field === "銷量") { item.salesDisplay = value; item.sales = numberValue(value); item.index = calcIndex(item.sales, item.fans); }
      if (field === "完成蒐證") item.status = value;
    }
    async function copyTextToClipboard(text) {
      const value = String(text || "").trim();
      if (!value) return false;

      try {
        await navigator.clipboard.writeText(value);
        return true;
      } catch (error) {
        const input = document.createElement("textarea");
        input.value = value;
        input.style.position = "fixed";
        input.style.left = "-9999px";
        input.style.top = "-9999px";
        document.body.appendChild(input);
        input.focus();
        input.select();

        try {
          document.execCommand("copy");
          return true;
        } catch {
          return false;
        } finally {
          document.body.removeChild(input);
        }
      }
    }

    function safeMessageValue(value, fallback = "未填") {
      const text = String(value || "").trim();
      if (!text || ["無", "未抓到", "null", "undefined"].includes(text.toLowerCase())) return fallback;
      return text;
    }

    function buildShopeeChatMessage(item) {
      const shop = safeMessageValue(item.shop, "未命名店家");
      const category = safeMessageValue(item.category, "未分類");
      const company = safeMessageValue(item.company, "未查得");
      const taxId = safeMessageValue(item.taxId, "未查得");
      const shopId = safeMessageValue(item.shopId, "未查得");
      const itemId = safeMessageValue(item.itemId, "未查得");
      const url = safeMessageValue(item.url, "未提供");

      return [
        `您好，這邊想跟貴店確認一筆商品資料。`,
        ``,
        `店名：${shop}`,
        `款式：${category}`,
        `商品連結：${url}`,
        `登記公司：${company}`,
        `統編：${taxId}`,
        `賣場編號：${shopId}`,
        `商品編號：${itemId}`,
        ``,
        `我們正在進行商品權利與來源資料確認。此商品疑似與我方商品、圖片或設計內容高度相似，為避免後續爭議，請協助回覆商品來源、授權資料，或先下架相關商品。`,
        ``,
        `若貴店已有合法來源或授權，也請協助提供可確認的資料，謝謝。`
      ].join("\n");
    }

    function openMessageTemplate(id) {
      const item = allItems.find(entry => entry.id === id);
      if (!item) {
        alert("找不到這筆資料，請重新整理後再試。");
        return;
      }

      messageMeta.textContent = `${item.shop}｜${item.category || "未分類"}`;
      messageText.value = buildShopeeChatMessage(item);
      activeMessageItem = item;
      messageModal.classList.remove("hidden");
      messageText.focus();
      messageText.select();
    }

    function closeMessageTemplate() {
      messageModal.classList.add("hidden");
      messageText.value = "";
      activeMessageItem = null;
    }

    function getShopeeChatUrl(item) {
      const productUrl = String(item && item.url || "").trim();
      if (productUrl) return productUrl;
      const shopId = String(item && item.shopId || "").trim();
      if (shopId) return `https://shopee.tw/shop/${encodeURIComponent(shopId)}`;
      return "https://shopee.tw/webchat";
    }

    async function copyMessageTemplate() {
      const chatUrl = getShopeeChatUrl(activeMessageItem);
      const chatWindow = window.open(chatUrl, "_blank");
      const copied = await copyTextToClipboard(messageText.value);

      if (copied) {
        showAppNotice("訊息已複製，正在開啟商品頁", "success");
        closeMessageTemplate();
        if (!chatWindow) {
          alert("訊息已複製，但 Chrome 可能擋住了商品頁視窗。\n\n請允許此網站開啟彈出視窗後，再按一次訊息。");
        }
        return;
      }

      if (!chatWindow) {
        showAppNotice("複製與開啟商品頁都失敗，請手動處理", "error");
        return;
      }

      showAppNotice("已開啟商品頁，訊息請手動複製", "error");
    }

    function openScreenshotTool(shopName, category) {
      const encodedShop = encodeURIComponent(String(shopName || "").trim());
      const encodedCategory = encodeURIComponent(String(category || "").trim());
      const protocolUrl = "shopeehunter-screenshot://open?shop=" + encodedShop + "&category=" + encodedCategory;
      const launcher = document.createElement("a");
      launcher.href = protocolUrl;
      launcher.style.display = "none";
      document.body.appendChild(launcher);
      launcher.click();
      setTimeout(() => launcher.remove(), 1000);
    }

    async function openProduct(url, shopName, itemCategory, itemId) {
      const selectedCategory = PRODUCT_CATEGORIES.includes(itemCategory) ? itemCategory : (categoryFilter ? categoryFilter.value : "全部");

      if (!PRODUCT_CATEGORIES.includes(selectedCategory)) {
        showAppNotice("這筆資料缺少商品款式，無法開啟截圖工具", "error");
        alert("這筆資料缺少商品款式，無法決定截圖資料夾。\n\n請先確認試算表的款式欄位。");
        return;
      }

      markRankingViewed(itemId);

      if (shopName) {
        const copied = await copyTextToClipboard(shopName);
        if (copied) showAppNotice("已複製店名，正在開啟截圖工具", "success");
        if (!copied) showAppNotice("正在開啟截圖工具，店名請以畫面為準", "success");
      }

      let productWindow = null;
      if (url) productWindow = window.open(url, "_blank", "noopener,noreferrer");
      if (url && !productWindow) {
        showAppNotice("商品頁可能被 Chrome 擋住，請允許此網站開啟彈出視窗", "error");
        alert("商品頁沒有成功開啟。\n\n請在 Chrome 右上角允許 shopee-hunter.vercel.app 開啟彈出視窗後，再按一次查看。");
      }

      setTimeout(() => openScreenshotTool(shopName, selectedCategory), 150);
    }

    async function postGas(body) {
      isMutating = true;
      try {
        const res = await fetch(GAS_URL, { method: "POST", body });
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch {
          return { success: res.ok, message: text };
        }
      } finally {
        isMutating = false;
      }
    }

    async function toggleMark(id) {
      const item = allItems.find(entry => entry.id === id);
      if (!item) {
        alert("找不到這筆資料，請重新整理後再試。");
        return;
      }

      const nextStatus = item.status === "已標記" ? "" : "已標記";
      const actionText = nextStatus === "已標記" ? "標記" : "取消標記";

      showAppNotice(`正在${actionText}資料，請稍候...`, "loading");
      setStatus(`${actionText}中`);

      try {
        const body = new URLSearchParams();
        body.set("action", "mark");
        body.set("id", id);
        body.set("status", nextStatus);
        body.set("user", currentUser);

        const result = await postGas(body);
        if (!result.success) throw new Error(result.message || "GAS 未回傳 success:true");

        item.status = nextStatus;
        if (nextStatus === "已標記") clearRankingViewed(id);
        renderAll();
        setStatus(`${actionText}成功`, "ok");
        showAppNotice(`${actionText}完成，試算表已同步`, "success");
      } catch (error) {
        alert(`${actionText}失敗：` + error.message);
        setStatus(`${actionText}失敗`, "error");
        showAppNotice(`${actionText}失敗，請稍後再試`, "error");
      }
    }

        body.set("id", id);

    async function bulkDeleteTrash() {
      const trashItems = getTrashItems();

      if (!trashItems.length) {
        alert("垃圾桶沒有資料可以刪除。");
        return;
      }

      const ok = confirm(`確定要永久刪除垃圾桶裡的 ${trashItems.length} 筆資料？\n\n這會直接刪除試算表中所有狀態為「已刪除」的資料，刪除後無法從網站復原。`);
      if (!ok) return;

      bulkDeleteTrashBtn.disabled = true;
      bulkDeleteTrashBtn.textContent = "刪除中";
      showAppNotice(`正在永久刪除垃圾桶 ${trashItems.length} 筆資料，請稍候...`, "loading");
      setStatus("垃圾桶刪除中");

      try {
        const body = new URLSearchParams();
        body.set("action", "bulkDeleteTrash");
        body.set("user", currentUser);

        const result = await postGas(body);
        if (!result.success) throw new Error(result.message || "GAS 未回傳 success:true");

        trashItems.forEach(item => permanentlyDeletedIds.add(item.id));
        allItems = allItems.filter(item => item.status !== "已刪除");

        renderAll();

        const deletedCount = result.deletedCount || trashItems.length;
        setStatus("垃圾桶已清空", "ok");
        showAppNotice(`永久刪除完成，共刪除 ${deletedCount} 筆資料`, "success");
      } catch (error) {
        alert("一鍵刪除失敗：" + error.message);
        setStatus("垃圾桶刪除失敗", "error");
        showAppNotice("一鍵刪除失敗，請稍後再試", "error");
      } finally {
        bulkDeleteTrashBtn.disabled = getTrashItems().length === 0;
        bulkDeleteTrashBtn.textContent = "一鍵刪除";
      }
    }

    function switchPage(page) {
      document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));

      dashboardPage.classList.toggle("hidden", page !== "dashboard");
      rankingPage.classList.toggle("hidden", page !== "ranking");
      markedPage.classList.toggle("hidden", page !== "marked");
      incompletePage.classList.toggle("hidden", page !== "incomplete");
      trashPage.classList.toggle("hidden", page !== "trash");
      mobileImportPage.classList.toggle("hidden", page !== "mobileImport");
      mobilePendingPage.classList.toggle("hidden", page !== "mobilePending");

      if (page === "dashboard") {
        pageTitle.textContent = "首頁";
        pageSubtitle.textContent = "總覽目前試算表同步資料、排行榜與風險區間分布。";
      }

      if (page === "ranking") {
        pageTitle.textContent = "排行榜";
        pageSubtitle.textContent = "只顯示尚未標記、尚未刪除的資料。";
      }

      if (page === "marked") {
        pageTitle.textContent = "已標記";
        pageSubtitle.textContent = "查看已同步標記的商品資料，取消標記後會回到排行榜。";
      }

      if (page === "incomplete") {
        pageTitle.textContent = "資料不齊全";
        pageSubtitle.textContent = "集中查看資料不齊的資料，可直接在卡片上補資料。";
      }

      if (page === "mobileImport") {
        pageTitle.textContent = "手機匯入資料";
        pageSubtitle.textContent = "手機圖搜圖找到的商品連結可先匯入，之後回電腦逐筆確認。";
      }

      if (page === "mobilePending") {
        pageTitle.textContent = "手機待確認";
        pageSubtitle.textContent = "用列表管理手機匯入的商品線索，查看後可用擴充功能正式抓資料。";
      }

      if (page === "trash") {
        pageTitle.textContent = "垃圾桶";
        pageSubtitle.textContent = "顯示網站端刪除的資料，可復原或一鍵永久刪除。";
      }
    }

    function login() {
      const name = usernameInput.value.trim();
      if (!name) {
        alert("請輸入使用者名稱。");
        usernameInput.focus();
        return;
      }
      currentUser = name;
      currentUserEl.textContent = name;
      loginModal.style.display = "none";
      loadData();
      startAutoRefresh();
    }

    function escapeHtml(value) {
      return String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'").replaceAll("\n", "\\n").replaceAll("\r", "");
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/["\\]/g, "\\$&");
    }

    document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => switchPage(btn.dataset.page)));
    searchInput.addEventListener("input", () => { resetPage("ranking"); renderRanking(); });
    categoryFilter.addEventListener("change", () => { resetPage("ranking"); renderRanking(); });
    completenessFilter.addEventListener("change", () => { resetPage("ranking"); renderRanking(); });
    markedSearchInput.addEventListener("input", () => { resetPage("marked"); renderMarked(); });
    markedCategoryFilter.addEventListener("change", () => { resetPage("marked"); renderMarked(); });
    markedCompletenessFilter.addEventListener("change", () => { resetPage("marked"); renderMarked(); });
    incompleteSearchInput.addEventListener("input", () => { resetPage("incomplete"); renderIncomplete(); });
    incompleteCategoryFilter.addEventListener("change", () => { resetPage("incomplete"); renderIncomplete(); });
    trashSearchInput.addEventListener("input", () => { resetPage("trash"); renderTrash(); });
    loginBtn.addEventListener("click", login);
    refreshBtn.addEventListener("click", () => loadData());
    bulkDeleteTrashBtn.addEventListener("click", bulkDeleteTrash);
    mobileImportBtn.addEventListener("click", importMobileUrls);
    mobilePendingCategory.addEventListener("change", () => { resetPage("mobilePending"); renderMobilePending(); });
    copyMessageBtn.addEventListener("click", copyMessageTemplate);
    closeMessageBtn.addEventListener("click", closeMessageTemplate);
    messageModal.addEventListener("click", event => {
      if (event.target === messageModal) closeMessageTemplate();
    });
    usernameInput.addEventListener("keydown", event => { if (event.key === "Enter") login(); });
    window.addEventListener("load", () => { usernameInput.focus(); switchPage("dashboard"); });
    if (versionBadge) versionBadge.textContent = `版本 ${APP_VERSION}`;
    window.addEventListener("beforeunload", stopAutoRefresh);
  </script>
</body>
</html>
