<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter 後台</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
}

/* Sidebar */
.sidebar{
  width:240px;
  background:#020617;
  height:100vh;
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.group-title{
  margin-top:20px;
  margin-bottom:8px;
  font-size:12px;
  color:#64748b;
}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:12px;
  background:#0f172a;
  border:none;
  color:#94a3b8;
  cursor:pointer;
  text-align:left;
  border-radius:8px;
}

.sidebar button:hover{
  background:#1e293b;
  color:#fff;
}

/* 主畫面 */
.main{
  flex:1;
  padding:20px;
}

/* 統計 */
.stats{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.stat{
  background:#1e293b;
  padding:20px;
  flex:1;
  border-radius:10px;
}

/* 警示 */
.alert{
  padding:15px;
  margin-bottom:20px;
  border-radius:10px;
  font-weight:bold;
}

.red{background:#7f1d1d;}
.yellow{background:#78350f;}
.green{background:#14532d;}

/* 圖表 */
.chart-box{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

/* 卡片 */
.card{
  background:#1e293b;
  padding:20px;
  margin:12px 0;
  border-radius:12px;
  line-height:1.6;
}

.rank{
  color:#facc15;
  font-weight:bold;
  margin-bottom:6px;
}

.label{
  color:#94a3b8;
}

.value{
  color:#fff;
}
</style>

</head>

<body>

<div class="sidebar">

  <h2>🔥 ShopeeHunter</h2>

  <div class="group-title">主功能</div>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
  <button onclick="showPage('checked')">✔ 已標記</button>
  <button onclick="showPage('unchecked')">❗ 未標記</button>

  <div class="group-title">工具</div>
  <button onclick="showPage('export')">📤 匯出資料</button>

  <div class="group-title">系統</div>
  <button onclick="showPage('settings')">⚙ 設定</button>

</div>

<div class="main">

  <!-- Dashboard -->
  <div id="dashboard">
    <h1>Dashboard</h1>

    <div id="alertBox"></div>

    <div class="stats">
      <div class="stat">總筆數：<span id="total"></span></div>
      <div class="stat">已標記：<span id="checkedCount"></span></div>
      <div class="stat">未標記：<span id="uncheckedCount"></span></div>
      <div class="stat">平均指數：<span id="avgScore"></span></div>
    </div>

    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- 排行榜 -->
  <div id="listPage" style="display:none;">
    <h1>排行榜</h1>
    <div id="list"></div>
  </div>

</div>

<script>
const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

let items = [];
let chart;

function parseNum(str){
  if(!str) return 0;
  str = str.replace(/,/g,"");
  if(str.includes("萬")) return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

function showPage(page){
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("listPage").style.display = "none";

  if(page==="dashboard"){
    document.getElementById("dashboard").style.display = "block";
  }

  if(page==="list"){
    document.getElementById("listPage").style.display = "block";
    render(items);
  }

  if(page==="checked"){
    document.getElementById("listPage").style.display = "block";
    render(items.filter(i=>i.checked));
  }

  if(page==="unchecked"){
    document.getElementById("listPage").style.display = "block";
    render(items.filter(i=>!i.checked));
  }
}

/* ⭐ 排行榜卡片（完整版） */
function render(data){

  let html = "";
  const maxScore = data[0]?.score || 1;

  data.forEach((item,i)=>{

    const percent = ((item.score/maxScore)*100).toFixed(0);

    html += `
    <div class="card">

      <div class="rank">#${i+1}</div>

      <div><span class="label">商品名：</span><span class="value">${item.title || "無"}</span></div>
      <div><span class="label">店名：</span><span class="value">${item.shop || "無"}</span></div>

      <div><span class="label">銷量：</span><span class="value">${item.sold || "0"}</span></div>
      <div><span class="label">粉絲數：</span><span class="value">${item.fans || "0"}</span></div>

      <div><span class="label">登記公司：</span><span class="value">${item.company || "無"}</span></div>
      <div><span class="label">統一編號：</span><span class="value">${item.id || "無"}</span></div>

      <div style="margin-top:10px;">
        <b>侵權指數：${percent}%</b>
      </div>

    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* 分級圖 */
function renderChart(){

  const ranges = [0,0,0,0,0];

  items.forEach(item=>{
    let percent = (item.score / items[0].score) * 100;

    if(percent <=20) ranges[0]++;
    else if(percent <=40) ranges[1]++;
    else if(percent <=60) ranges[2]++;
    else if(percent <=80) ranges[3]++;
    else ranges[4]++;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:["0-20%","20-40%","40-60%","60-80%","80-100%"],
      datasets:[{
        label:'侵權風險分布',
        data:ranges,
      }]
    }
  });
}

/* 警示 */
function renderAlert(){

  let highRisk = items.filter(item=>{
    let percent = (item.score / items[0].score) * 100;
    return percent > 80;
  }).length;

  let box = document.getElementById("alertBox");

  if(highRisk >= 3){
    box.className = "alert red";
    box.innerText = `⚠ 系統狀態：🔴 高風險（${highRisk}筆）`;
  }
  else if(highRisk > 0){
    box.className = "alert yellow";
    box.innerText = `⚠ 系統狀態：🟡 注意（${highRisk}筆）`;
  }
  else{
    box.className = "alert green";
    box.innerText = "✔ 系統狀態：🟢 正常";
  }
}

async function loadData(){

  const res = await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`
  );

  const data = await res.json();

  items = data.documents.map(doc=>{
    const f = doc.fields;

    const sold = f.sold?.stringValue||"0";
    const fans = f.fans?.stringValue||"0";

    return {
      title: f.title?.stringValue||"",
      shop: f.shop?.stringValue||"",
      sold,
      fans,
      company: f.company?.stringValue||"",
      id: f.taxId?.stringValue || f.id?.stringValue || "",
      checked: f.checked?.booleanValue||false,
      score: parseNum(sold)*0.7 + parseNum(fans)*0.3
    };
  });

  items.sort((a,b)=>b.score-a.score);

  document.getElementById("total").innerText = items.length;
  document.getElementById("checkedCount").innerText = items.filter(i=>i.checked).length;
  document.getElementById("uncheckedCount").innerText = items.filter(i=>!i.checked).length;

  const avg = items.reduce((a,b)=>a+b.score,0)/items.length;
  document.getElementById("avgScore").innerText = avg.toFixed(0);

  renderChart();
  renderAlert();
}

loadData();
</script>

</body>
</html>
