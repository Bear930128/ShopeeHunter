<!-- ⭐⭐ 只顯示關鍵修改（你直接用我這段取代原本 toggleCheck + 底部script）⭐⭐ -->

<script>

/* ===== 改寫 toggleCheck（完整接管） ===== */
toggleCheck = async function(docId){

  const item = items.find(i=>i.docId===docId);
  if(!item) return;

  const btn = event.target;
  btn.disabled = true;
  btn.innerText = "寫入中...";

  const newValue = !item.checked;

  // ⭐ Firestore 更新（保留）
  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}?updateMask.fieldPaths=checked`,
    {
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        fields:{checked:{booleanValue:newValue}}
      })
    }
  );

  item.checked = newValue;

  // ⭐ 只在「標記」時寫入試算表
  if(newValue){

    const sheet = document.getElementById("sheetSelect")?.value || "鞋托架";

    fetch("https://script.google.com/macros/s/AKfycbzVsVpAH-ZMJhq8CamtNhIcRlguUM6WjyH2BLS7Y1TmP_JWj3bOlN7T19ddhlIaSzaq/exec",{
      method:"POST",
      body:JSON.stringify({
        sheet,
        title:item.title,
        url:item.url,
        shop:item.shop,
        fans:item.fans,
        company:item.company,
        taxId:item.taxId,
        sold:item.sold
      })
    })
    .then(()=>{
      showToast("✅ 已寫入 "+sheet);
      btn.innerText = "✔已標記";
    })
    .catch(()=>{
      showToast("❌ 寫入失敗");
      btn.disabled = false;
      btn.innerText = "✔標記";
    });

  }else{
    btn.disabled = false;
    btn.innerText = "✔標記";
  }

  renderDashboard();
  applySearch();
};


/* ===== 通知 ===== */
function showToast(msg){
  let t = document.getElementById("toast_box");

  if(!t){
    t = document.createElement("div");
    t.id = "toast_box";
    t.style.position = "fixed";
    t.style.top = "20px";
    t.style.right = "20px";
    t.style.background = "#22c55e";
    t.style.padding = "12px 20px";
    t.style.borderRadius = "8px";
    t.style.zIndex = "9999";
    t.style.display = "none";
    document.body.appendChild(t);
  }

  t.innerText = msg;
  t.style.display = "block";

  setTimeout(()=>{
    t.style.display = "none";
  },2000);
}


/* ===== 下拉選單 ===== */
function injectSelector(){

  const box = document.querySelector(".search-box");
  if(!box || document.getElementById("sheetSelect")) return;

  const select = document.createElement("select");
  select.id = "sheetSelect";
  select.style.marginTop = "10px";
  select.style.padding = "8px";
  select.style.borderRadius = "6px";

  ["鞋托架","置物架","手機架","文件盒","鏡櫃盒","翻蓋盒"]
  .forEach(name=>{
    const opt = document.createElement("option");
    opt.textContent = name;
    select.appendChild(opt);
  });

  box.appendChild(select);
}


/* ===== 啟動 ===== */
setTimeout(injectSelector,500);

</script>
