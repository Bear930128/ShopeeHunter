<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter 排行榜</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h1{
  text-align:center;
}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
.rank{
  font-size:20px;
  color:#facc15;
}
</style>

</head>
<body>

<h1>🔥 ShopeeHunter 排行榜</h1>

<div id="list">載入中...</div>

<script>
const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

function parseNum(str){
  if(!str) return 0;
  str = str.replace(/,/g,"");

  if(str.includes("萬")){
    return parseFloat(str) * 10000;
  }

  return parseFloat(str) || 0;
}

async function loadData(){

  const res = await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`
  );

  const data = await res.json();

  if(!data.documents){
    document.getElementById("list").innerHTML = "沒有資料";
    return;
  }

  const items = data.documents.map(doc=>{
    const f = doc.fields;

    return {
      title: f.title?.stringValue || "",
      sold: f.sold?.stringValue || "0",
      shop: f.shop?.stringValue || "",
      fans: f.fans?.stringValue || "0"
    };
  });

  // 🔥 侵權指數排序（銷量70% + 粉絲30%）
  items.sort((a,b)=>{
    const scoreA = parseNum(a.sold)*0.7 + parseNum(a.fans)*0.3;
    const scoreB = parseNum(b.sold)*0.7 + parseNum(b.fans)*0.3;
    return scoreB - scoreA;
  });

  let html = "";

  items.forEach((item,i)=>{

    const score = (parseNum(item.sold)*0.7 + parseNum(item.fans)*0.3).toFixed(0);

    html += `
    <div class="card">
      <div class="rank">#${i+1}</div>
      <div>商品：${item.title}</div>
      <div>店名：${item.shop}</div>
      <div>銷量：${item.sold}</div>
      <div>粉絲：${item.fans}</div>
      <div>侵權指數：${score}</div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadData();
</script>

</body>
</html>
