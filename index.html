<body>

<!-- ✅ ⭐ 修正：新增功能移進 body，並延後執行 -->
<script>

window.addEventListener("load", () => {

/* ===== 通知 ===== */
function showToast(msg){
  let t = document.getElementById("toast_box");

  if(!t){
    t = document.createElement("div");
    t.id = "toast_box";
    t.style.position = "fixed";
    t.style.top = "20px";
    t.style.right = "20px";
    t.style.background = "#22c55e";
    t.style.padding = "12px 20px";
    t.style.borderRadius = "8px";
    t.style.zIndex = "9999";
    document.body.appendChild(t);
  }

  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

/* ===== selector ===== */
function injectSelector(){
  const box = document.querySelector(".search-box");
  if(!box || document.getElementById("sheetSelect")) return;

  const select = document.createElement("select");
  select.id = "sheetSelect";

  ["鞋托架","置物架","手機架","文件盒","鏡櫃盒","翻蓋盒"]
  .forEach(name=>{
    const opt = document.createElement("option");
    opt.textContent = name;
    select.appendChild(opt);
  });

  box.appendChild(select);
}

/* ===== 安全 override（關鍵） ===== */
if(typeof toggleCheck === "function"){
  const _oldToggle = toggleCheck;

  toggleCheck = async function(docId){

    const item = items.find(i=>i.docId===docId);
    const newValue = !item.checked;

    await _oldToggle(docId);

    if(newValue){
      const sheet = document.getElementById("sheetSelect")?.value || "鞋托架";

      fetch("你的GAS網址",{
        method:"POST",
        body:JSON.stringify({...item, sheet})
      })
      .then(()=>showToast("✅ 已寫入"))
      .catch(()=>showToast("❌ 失敗"));
    }
  };
}

injectSelector();

});
</script>

</body>
</html>
