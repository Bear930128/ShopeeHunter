<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}
.sidebar{width:240px;background:#020617;height:100vh;padding:20px;}
.sidebar button{width:100%;margin:6px 0;padding:12px;background:#0f172a;border:none;color:#94a3b8;border-radius:8px;cursor:pointer;text-align:left;}
.main{flex:1;padding:20px;}
.card{background:#1e293b;border-radius:10px;padding:20px;margin:10px 0;}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('list')">排行榜</button>
</div>

<div class="main">
  <div id="dashboard">
    <h1>Dashboard</h1>
    <div id="status">初始化中...</div>
  </div>

  <div id="listPage" style="display:none;">
    <h1>排行榜</h1>
    <div id="list"></div>
  </div>
</div>

<script>
const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

let items = [];

function showPage(p){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("listPage").style.display="none";

  if(p==="dashboard"){
    document.getElementById("dashboard").style.display="block";
  }else{
    document.getElementById("listPage").style.display="block";
    renderList();
  }
}

function renderList(){
  let html="";

  if(items.length===0){
    html="<div class='card'>沒有資料</div>";
  }

  items.forEach(item=>{
    html+=`
    <div class="card">
      <div>${item.title}</div>
      <div>${item.shop}</div>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
}

async function loadData(){
  try{

    document.getElementById("status").innerText = "載入中...";

    const res = await fetch(
      `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`
    );

    const data = await res.json();

    console.log("Firestore回傳：", data);

    // ⭐ 防炸判斷（關鍵）
    if(!data.documents){
      document.getElementById("status").innerText =
        "❌ 沒有 documents（可能API失敗或權限問題）";
      return;
    }

    items = data.documents.map(doc=>{
      const f = doc.fields || {};

      return {
        title: f.title?.stringValue || "無標題",
        shop: f.shop?.stringValue || ""
      };
    });

    document.getElementById("status").innerText =
      "✅ 載入成功：" + items.length;

  }catch(err){
    console.error(err);
    document.getElementById("status").innerText =
      "❌ JS錯誤：" + err.message;
  }
}

loadData();
</script>

</body>
</html>
