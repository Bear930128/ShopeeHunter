<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopeeHunter Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #06111f;
      --border: #1f4f86;
      --blue: #2f8cff;
      --cyan: #58d7ff;
      --green: #38d996;
      --red: #ff4d6d;
      --yellow: #f7c948;
      --text: #eef6ff;
      --muted: #8db4de;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top left, rgba(47, 140, 255, 0.18), transparent 34%), var(--bg);
      color: var(--text);
    }

    button, input { font-family: inherit; }
    a { color: var(--cyan); }

    .layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #071a30, #06111f);
      border-right: 1px solid var(--border);
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo { margin-bottom: 30px; }

    .logo h1 {
      margin: 0;
      font-size: 25px;
    }

    .logo p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav button {
      width: 100%;
      height: 44px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      text-align: left;
      padding: 0 14px;
      font-weight: 700;
      font-size: 15px;
    }

    .nav button.active,
    .nav button:hover {
      color: #fff;
      background: rgba(47, 140, 255, 0.16);
      border-color: rgba(88, 215, 255, 0.28);
    }

    .user-box {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 22px;
      padding: 14px;
      background: rgba(11, 32, 56, 0.8);
      border: 1px solid rgba(88, 215, 255, 0.18);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .user-box strong {
      display: block;
      color: #fff;
      margin-top: 6px;
      word-break: break-word;
    }

    .main {
      padding: 26px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .page-title h2 {
      margin: 0;
      font-size: 28px;
    }

    .page-title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .refresh-btn {
      height: 40px;
      border: 1px solid rgba(88, 215, 255, 0.38);
      border-radius: 8px;
      background: rgba(47, 140, 255, 0.18);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      padding: 0 16px;
      white-space: nowrap;
    }

    .refresh-btn:hover {
      background: rgba(47, 140, 255, 0.32);
    }

    .refresh-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      padding: 11px 16px;
      min-width: 160px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(7, 24, 43, 0.85);
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .status.ok { color: var(--green); }
    .status.error { color: var(--red); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }

    .stat,
    .chart-panel,
    .card,
    .empty {
      background: linear-gradient(180deg, rgba(15, 42, 73, 0.95), rgba(11, 32, 56, 0.95));
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .stat {
      padding: 18px;
      min-height: 112px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .stat strong {
      display: block;
      font-size: 30px;
      color: #fff;
      overflow-wrap: anywhere;
    }

    .chart-panel {
      height: 340px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .toolbar h3 {
      margin: 0;
      font-size: 22px;
    }

    .search {
      width: min(380px, 100%);
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #071426;
      color: #fff;
      outline: none;
      padding: 0 14px;
    }

    .search:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(88, 215, 255, 0.12);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      padding: 18px;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product {
      margin: 0 0 10px;
      font-size: 17px;
      line-height: 1.45;
      word-break: break-word;
    }

    .shop {
      color: var(--cyan);
      font-size: 14px;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .captured,
    .company-info {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.45;
      word-break: break-word;
    }

    .captured strong,
    .company-info strong {
      color: #fff;
    }

    .company-block {
      margin: 12px 0 14px;
      padding: 10px 12px;
      background: rgba(6, 17, 31, 0.44);
      border: 1px solid rgba(88, 215, 255, 0.13);
      border-radius: 8px;
    }

    .data-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .data {
      background: rgba(6, 17, 31, 0.68);
      border: 1px solid rgba(88, 215, 255, 0.13);
      border-radius: 8px;
      padding: 10px 8px;
      min-width: 0;
    }

    .data span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .data strong {
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 86px;
      gap: 8px;
    }

    .actions button {
      height: 38px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-weight: 800;
    }

    .view-btn { background: var(--blue); }
    .mark-btn { background: #214f82; }
    .mark-btn.marked { background: var(--yellow); color: #0b2038; }
    .delete-btn { background: var(--red); }

    .actions button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
      border-style: dashed;
      line-height: 1.7;
    }

    .hidden { display: none; }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(3, 9, 17, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }

    .modal {
      width: min(420px, 100%);
      background: #0b2038;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .modal h2 { margin: 0 0 10px; }

    .modal p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .modal input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #071426;
      color: #fff;
      padding: 0 14px;
      outline: none;
      margin-bottom: 14px;
    }

    .modal button {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 1120px) {
      .stats, .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 760px) {
      .layout { grid-template-columns: 190px minmax(0, 1fr); }
      .sidebar { padding: 18px 12px; }
      .logo h1 { font-size: 20px; }
      .main { padding: 18px; }
      .topbar, .toolbar { flex-direction: column; align-items: stretch; }
      .top-actions { align-items: stretch; }
      .stats, .grid { grid-template-columns: 1fr; }
      .chart-panel { height: 300px; }
      .actions { grid-template-columns: 1fr; }
      .user-box { left: 12px; right: 12px; }
    }
  </style>
</head>

<body>
  <div id="loginModal" class="modal-mask">
    <div class="modal">
      <h2>輸入使用者名稱</h2>
      <p>每次進入或重新整理網站都需要輸入，方便多人使用時辨識操作來源。</p>
      <input id="usernameInput" type="text" placeholder="例如：Amy、業務A、管理員" autocomplete="off" />
      <button id="loginBtn" type="button">進入網站</button>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <h1>ShopeeHunter</h1>
        <p>Google Sheet 同步監控後台</p>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-page="dashboard" type="button">首頁</button>
        <button class="nav-btn" data-page="ranking" type="button">排行榜</button>
        <button class="nav-btn" data-page="marked" type="button">已標記</button>
      </nav>

      <div class="user-box">
        目前使用者
        <strong id="currentUser">尚未登入</strong>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">首頁</h2>
          <p id="pageSubtitle">總覽目前試算表同步資料、排行榜與風險區間分布。</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="refresh-btn" type="button">刷新資料</button>
          <div id="status" class="status">等待登入</div>
        </div>
      </header>

      <section id="dashboardPage">
        <section class="stats">
          <div class="stat"><span>總筆數</span><strong id="totalCount">0</strong></div>
          <div class="stat"><span>平均指數</span><strong id="avgIndex">0</strong></div>
          <div class="stat"><span>最高銷量</span><strong id="maxSales">0</strong></div>
          <div class="stat"><span>已標記</span><strong id="markedCount">0</strong></div>
        </section>

        <section class="chart-panel">
          <canvas id="mainChart"></canvas>
        </section>
      </section>

      <section id="rankingPage" class="hidden">
        <div class="toolbar">
          <h3>排行榜</h3>
          <input id="searchInput" class="search" type="search" placeholder="搜尋商品名或店名、公司、統編" />
        </div>
        <section id="rankingGrid" class="grid">
          <div class="empty">資料載入中...</div>
        </section>
      </section>

      <section id="markedPage" class="hidden">
        <div class="toolbar">
          <h3>已標記</h3>
          <input id="markedSearchInput" class="search" type="search" placeholder="搜尋已標記商品、店名、公司、統編" />
        </div>
        <section id="markedGrid" class="grid">
          <div class="empty">尚無已標記資料</div>
        </section>
      </section>
    </main>
  </div>

  <script>
    const OPENSHEET_URL = "https://opensheet.elk.sh/1-oQQ4gEThHOcZKq2VlSnsv0lll1JVXrcjChKweCz5o8/Sheet1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxTn6fVF8lQbEk7HyfEU96G8yqPXYgX7TGVVcxNMpe4v92uhD4WGBEjduWJweEAGjxD4g/exec";

    let currentUser = "";
    let allItems = [];
    let chart = null;
    let isLoading = false;

    const loginModal = document.getElementById("loginModal");
    const usernameInput = document.getElementById("usernameInput");
    const loginBtn = document.getElementById("loginBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const currentUserEl = document.getElementById("currentUser");
    const statusEl = document.getElementById("status");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");

    const dashboardPage = document.getElementById("dashboardPage");
    const rankingPage = document.getElementById("rankingPage");
    const markedPage = document.getElementById("markedPage");

    const totalCountEl = document.getElementById("totalCount");
    const avgIndexEl = document.getElementById("avgIndex");
    const maxSalesEl = document.getElementById("maxSales");
    const markedCountEl = document.getElementById("markedCount");

    const rankingGrid = document.getElementById("rankingGrid");
    const markedGrid = document.getElementById("markedGrid");
    const searchInput = document.getElementById("searchInput");
    const markedSearchInput = document.getElementById("markedSearchInput");

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status " + type;
    }

    function textValue(value) {
      return String(value || "").trim();
    }

    function numberValue(value) {
      let text = String(value || "").trim();

      if (!text) return 0;

      text = text
        .replaceAll(",", "")
        .replaceAll("+", "")
        .replaceAll("＋", "")
        .replace(/\s/g, "");

      let multiplier = 1;

      if (text.includes("萬")) {
        multiplier = 10000;
        text = text.replace("萬", "");
      }

      if (text.toLowerCase().includes("k")) {
        multiplier = 1000;
        text = text.toLowerCase().replace("k", "");
      }

      const n = Number(text.replace(/[^\d.-]/g, ""));
      return Number.isFinite(n) ? Math.round(n * multiplier) : 0;
    }

    function displayValue(rawValue, numericValue) {
      const raw = textValue(rawValue);
      return raw || formatNumber(numericValue);
    }

    function formatNumber(value) {
      const n = Number(value) || 0;

      if (n >= 10000) {
        const v = n / 10000;
        return Number.isInteger(v) ? `${v}萬` : `${v.toFixed(1)}萬`;
      }

      return n.toLocaleString();
    }

    function getField(row, names) {
      for (const name of names) {
        if (row[name] !== undefined && String(row[name]).trim() !== "") {
          return row[name];
        }
      }
      return "";
    }

    function calcIndex(sales, fans) {
      const salesScore = Math.min(sales / 100, 70);
      const fanScore = Math.min(fans / 1000, 30);
      return Math.round(Math.min(100, salesScore + fanScore));
    }

    function normalizeRow(row) {
      const id = textValue(getField(row, ["ID", "Id", "id"]));
      const url = textValue(getField(row, ["URL", "url", "網址"]));
      const product = textValue(getField(row, ["商品", "商品名", "Product", "product"]));
      const shop = textValue(getField(row, ["店名", "商店", "Shop", "shop"]));
      const company = textValue(getField(row, ["公司", "公司名", "登記公司", "Company", "company"]));
      const taxId = textValue(getField(row, ["統編", "統一編號", "Tax ID", "taxId", "taxid"]));

      const rawFans = getField(row, ["粉絲", "粉絲數", "Fans", "fans"]);
      const rawSales = getField(row, ["銷量", "銷售", "Sales", "sales"]);

      const fans = numberValue(rawFans);
      const sales = numberValue(rawSales);

      const capturedBy = textValue(getField(row, [
        "抓取者",
        "抓取人",
        "使用者",
        "使用者名稱",
        "建立者",
        "Created By",
        "createdBy",
        "user"
      ]));

      return {
        id,
        url,
        product: product || "未命名商品",
        shop: shop || "未命名店名",
        company: company || "未登記",
        taxId: taxId || "未登記",
        fans,
        sales,
        fansDisplay: displayValue(rawFans, fans),
        salesDisplay: displayValue(rawSales, sales),
        index: calcIndex(sales, fans),
        capturedBy: capturedBy || "未記錄"
      };
    }

    function dedupeItems(items) {
      const map = new Map();

      for (const item of items) {
        const key = item.id || item.url || `${item.product}-${item.shop}`;
        if (!key) continue;

        if (!map.has(key)) {
          map.set(key, item);
          continue;
        }

        const oldItem = map.get(key);
        if (item.sales >= oldItem.sales) {
          map.set(key, item);
        }
      }

      return Array.from(map.values());
    }

    async function loadData() {
      if (!currentUser) {
        alert("請先輸入使用者名稱。");
        usernameInput.focus();
        return;
      }

      if (isLoading) return;

      isLoading = true;
      refreshBtn.disabled = true;
      refreshBtn.textContent = "同步中";
      setStatus("資料同步中");

      try {
        const res = await fetch(OPENSHEET_URL, { cache: "no-store" });

        if (!res.ok) {
          throw new Error("OpenSheet HTTP " + res.status);
        }

        const rows = await res.json();

        if (!Array.isArray(rows)) {
          throw new Error("OpenSheet 回傳格式錯誤");
        }

        allItems = dedupeItems(
          rows
            .map(normalizeRow)
            .filter(item => item.id && item.product)
        );

        renderAll();
        setStatus("資料已同步", "ok");
      } catch (error) {
        console.error(error);
        allItems = [];
        renderAll();
        setStatus("資料載入失敗", "error");

        const message = `
          <div class="empty">
            資料讀取失敗。請確認 Google 試算表已公開、分頁名稱正確，且第一列欄位包含 ID、URL、商品、店名、粉絲、公司、統編、銷量。
            <br><br>
            <a href="${OPENSHEET_URL}" target="_blank" rel="noopener noreferrer">測試 opensheet 資料連結</a>
          </div>
        `;

        rankingGrid.innerHTML = message;
        markedGrid.innerHTML = message;
      } finally {
        isLoading = false;
        refreshBtn.disabled = false;
        refreshBtn.textContent = "刷新資料";
      }
    }

    function getMarkedKey() {
      return "shopeehunter_marked_" + currentUser;
    }

    function getMarkedIds() {
      try {
        return JSON.parse(localStorage.getItem(getMarkedKey()) || "[]");
      } catch {
        return [];
      }
    }

    function saveMarkedIds(ids) {
      localStorage.setItem(getMarkedKey(), JSON.stringify(ids));
    }

    function isMarked(id) {
      return getMarkedIds().includes(id);
    }

    function toggleMark(id) {
      const ids = getMarkedIds();

      if (ids.includes(id)) {
        saveMarkedIds(ids.filter(x => x !== id));
      } else {
        saveMarkedIds([...ids, id]);
      }

      renderAll();
    }

    function itemMatchesKeyword(item, keyword) {
      const target = [
        item.product,
        item.shop,
        item.company,
        item.taxId,
        item.capturedBy
      ].join(" ").toLowerCase();

      return target.includes(keyword);
    }

    function getRankingItems() {
      const keyword = searchInput.value.trim().toLowerCase();

      return allItems
        .filter(item => itemMatchesKeyword(item, keyword))
        .sort((a, b) => b.index - a.index || b.sales - a.sales);
    }

    function getMarkedItems() {
      const ids = getMarkedIds();
      const keyword = markedSearchInput.value.trim().toLowerCase();

      return allItems
        .filter(item => ids.includes(item.id))
        .filter(item => itemMatchesKeyword(item, keyword))
        .sort((a, b) => b.index - a.index || b.sales - a.sales);
    }

    function renderAll() {
      renderStats();
      renderChart();
      renderRanking();
      renderMarked();
    }

    function renderStats() {
      const total = allItems.length;
      const avg = total
        ? Math.round(allItems.reduce((sum, item) => sum + item.index, 0) / total)
        : 0;
      const maxSalesItem = allItems.reduce((top, item) => item.sales > top.sales ? item : top, { sales: 0, salesDisplay: "0" });

      totalCountEl.textContent = total.toLocaleString();
      avgIndexEl.textContent = avg.toLocaleString();
      maxSalesEl.textContent = maxSalesItem.salesDisplay || formatNumber(maxSalesItem.sales);
      markedCountEl.textContent = getMarkedItems().length.toLocaleString();
    }

    function getIndexBuckets(items) {
      const buckets = [
        { label: "0-20", min: 0, max: 20, count: 0, sales: 0 },
        { label: "21-40", min: 21, max: 40, count: 0, sales: 0 },
        { label: "41-60", min: 41, max: 60, count: 0, sales: 0 },
        { label: "61-80", min: 61, max: 80, count: 0, sales: 0 },
        { label: "81-100", min: 81, max: 100, count: 0, sales: 0 }
      ];

      for (const item of items) {
        const bucket = buckets.find(group => item.index >= group.min && item.index <= group.max);
        if (bucket) {
          bucket.count += 1;
          bucket.sales += item.sales;
        }
      }

      return buckets;
    }

    function renderChart() {
      const buckets = getIndexBuckets(allItems);

      if (chart) {
        chart.destroy();
      }

      chart = new Chart(document.getElementById("mainChart"), {
        type: "bar",
        data: {
          labels: buckets.map(bucket => bucket.label),
          datasets: [
            {
              label: "商品數",
              data: buckets.map(bucket => bucket.count),
              backgroundColor: "rgba(47, 140, 255, 0.68)",
              borderColor: "#58d7ff",
              borderWidth: 1,
              yAxisID: "y"
            },
            {
              label: "總銷量",
              data: buckets.map(bucket => bucket.sales),
              type: "line",
              borderColor: "#38d996",
              backgroundColor: "rgba(56, 217, 150, 0.12)",
              tension: 0.35,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { labels: { color: "#eef6ff" } },
            tooltip: {
              callbacks: {
                title(items) {
                  return `侵權指數區間：${items[0].label}`;
                },
                label(context) {
                  if (context.dataset.label === "總銷量") {
                    return `總銷量：${formatNumber(context.raw)}`;
                  }

                  return `商品數：${context.raw}`;
                }
              }
            }
          },
          scales: {
            x: {
              title: { display: true, text: "侵權指數區間", color: "#8db4de" },
              ticks: { color: "#8db4de" },
              grid: { color: "rgba(141, 180, 222, 0.12)" }
            },
            y: {
              beginAtZero: true,
              title: { display: true, text: "商品數", color: "#8db4de" },
              ticks: { color: "#8db4de", precision: 0 },
              grid: { color: "rgba(141, 180, 222, 0.12)" }
            },
            y1: {
              beginAtZero: true,
              position: "right",
              title: { display: true, text: "總銷量", color: "#8db4de" },
              ticks: {
                color: "#8db4de",
                callback(value) {
                  return formatNumber(value);
                }
              },
              grid: { drawOnChartArea: false }
            }
          }
        }
      });
    }

    function renderRanking() {
      const items = getRankingItems();
      rankingGrid.innerHTML = items.length
        ? items.map(renderCard).join("")
        : '<div class="empty">沒有符合條件的資料</div>';
    }

    function renderMarked() {
      const items = getMarkedItems();
      markedGrid.innerHTML = items.length
        ? items.map(renderCard).join("")
        : '<div class="empty">尚無已標記資料</div>';
    }

    function renderCard(item) {
      const marked = isMarked(item.id);

      return `
        <article class="card" data-id="${escapeHtml(item.id)}">
          <div>
            <h3 class="product">${escapeHtml(item.product)}</h3>
            <div class="shop">${escapeHtml(item.shop)}</div>
            <div class="captured">抓取者：<strong>${escapeHtml(item.capturedBy)}</strong></div>

            <div class="company-block">
              <div class="company-info">公司：<strong>${escapeHtml(item.company)}</strong></div>
              <div class="company-info">統編：<strong>${escapeHtml(item.taxId)}</strong></div>
            </div>

            <div class="data-row">
              <div class="data">
                <span>銷量</span>
                <strong>${escapeHtml(item.salesDisplay)}</strong>
              </div>
              <div class="data">
                <span>粉絲</span>
                <strong>${escapeHtml(item.fansDisplay)}</strong>
              </div>
              <div class="data">
                <span>侵權指數</span>
                <strong>${item.index}</strong>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="view-btn" type="button" onclick="openProduct('${escapeJs(item.url)}')" ${item.url ? "" : "disabled"}>查看</button>
            <button class="mark-btn ${marked ? "marked" : ""}" type="button" onclick="toggleMark('${escapeJs(item.id)}')">${marked ? "已標記" : "標記"}</button>
            <button class="delete-btn" type="button" onclick="deleteItem('${escapeJs(item.id)}')">刪除</button>
          </div>
        </article>
      `;
    }

    function openProduct(url) {
      if (!url) return;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function deleteItem(id) {
      const item = allItems.find(x => x.id === id);

      if (!item) {
        alert("找不到這筆資料，請重新整理後再試。");
        return;
      }

      const ok = confirm(
        `確定要刪除這一筆資料？\n\nID：${item.id}\n商品：${item.product}\n店名：${item.shop}\n\n此操作會透過 GAS 從試算表刪除。`
      );

      if (!ok) return;

      const card = document.querySelector(`[data-id="${cssEscape(id)}"]`);
      const btn = card ? card.querySelector(".delete-btn") : null;

      if (btn) {
        btn.disabled = true;
        btn.textContent = "刪除中";
      }

      try {
        const body = new URLSearchParams();
        body.append("action", "delete");
        body.append("id", id);
        body.append("user", currentUser);

        const res = await fetch(GAS_URL, { method: "POST", body });
        const text = await res.text();
        let result = {};

        try {
          result = JSON.parse(text);
        } catch {
          result = { success: res.ok, message: text };
        }

        if (!res.ok || result.success === false || result.ok === false) {
          throw new Error(result.message || "刪除失敗");
        }

        allItems = allItems.filter(x => x.id !== id);
        saveMarkedIds(getMarkedIds().filter(x => x !== id));

        renderAll();
        setStatus("刪除成功", "ok");
        setTimeout(loadData, 800);
      } catch (error) {
        console.error(error);
        alert("刪除失敗，請確認 GAS 是用 ID 刪除單筆資料。");
        setStatus("刪除失敗", "error");

        if (btn) {
          btn.disabled = false;
          btn.textContent = "刪除";
        }
      }
    }

    function switchPage(page) {
      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.page === page);
      });

      dashboardPage.classList.toggle("hidden", page !== "dashboard");
      rankingPage.classList.toggle("hidden", page !== "ranking");
      markedPage.classList.toggle("hidden", page !== "marked");

      if (page === "dashboard") {
        pageTitle.textContent = "首頁";
        pageSubtitle.textContent = "總覽目前試算表同步資料、排行榜與風險區間分布。";
      }

      if (page === "ranking") {
        pageTitle.textContent = "排行榜";
        pageSubtitle.textContent = "依侵權指數與銷量排序，可查看、標記或刪除單筆資料。";
      }

      if (page === "marked") {
        pageTitle.textContent = "已標記";
        pageSubtitle.textContent = "查看目前使用者標記過的商品資料。";
      }
    }

    function login() {
      const name = usernameInput.value.trim();

      if (!name) {
        alert("請輸入使用者名稱。");
        usernameInput.focus();
        return;
      }

      currentUser = name;
      currentUserEl.textContent = name;
      loginModal.style.display = "none";
      loadData();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value || "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll("\n", "\\n")
        .replaceAll("\r", "");
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/["\\]/g, "\\$&");
    }

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => switchPage(btn.dataset.page));
    });

    searchInput.addEventListener("input", renderRanking);
    markedSearchInput.addEventListener("input", renderMarked);
    loginBtn.addEventListener("click", login);
    refreshBtn.addEventListener("click", loadData);

    usernameInput.addEventListener("keydown", event => {
      if (event.key === "Enter") login();
    });

    window.addEventListener("load", () => {
      usernameInput.focus();
      switchPage("dashboard");
    });
  </script>
</body>
</html>
