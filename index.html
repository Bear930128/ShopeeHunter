<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;display:flex;}
.sidebar{width:240px;background:#020617;height:100vh;padding:20px;}
.sidebar h2{margin-bottom:20px;}
.group-title{margin-top:20px;margin-bottom:8px;font-size:12px;color:#64748b;}
.sidebar button{width:100%;margin:6px 0;padding:12px;background:#0f172a;border:none;color:#94a3b8;border-radius:8px;cursor:pointer;text-align:left;}
.sidebar button:hover{background:#1e293b;color:#fff;}
.main{flex:1;padding:20px;}
.stats{display:flex;gap:15px;margin-bottom:20px;}
.stat,.chart-box,.card{background:#1e293b;border-radius:10px;}
.stat{padding:20px;flex:1;}
.chart-box{padding:20px;}
.card{padding:20px;margin:12px 0;border:2px solid transparent;line-height:1.6;}
.checked-card{border-color:#22c55e;}
.rank{color:#facc15;font-weight:bold;}
.search-box{margin-bottom:15px;}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none;}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
.view{background:#3b82f6;color:white;}
.check{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>рҹ”Ҙ ShopeeHunter</h2>

  <div class="group-title">дё»еҠҹиғҪ</div>
  <button onclick="showPage('dashboard')">рҹҸ  Dashboard</button>
  <button onclick="showPage('list')">рҹ“Ҡ жҺ’иЎҢжҰң</button>
  <button onclick="showPage('checked')">вң” е·ІжЁҷиЁҳ</button>

  <div class="group-title">е·Ҙе…·</div>
  <button onclick="exportData()">рҹ“Ө еҢҜеҮәе·ІжЁҷиЁҳ</button>
</div>

<div class="main">

  <div id="dashboard">
    <h1>Dashboard</h1>

    <div class="stats">
      <div class="stat">зёҪзӯҶж•ёпјҡ<span id="total">0</span></div>
      <div class="stat">е·ІжЁҷиЁҳпјҡ<span id="checkedCount">0</span></div>
      <div class="stat">жңӘжЁҷиЁҳпјҡ<span id="uncheckedCount">0</span></div>
      <div class="stat">е№іеқҮжҢҮж•ёпјҡ<span id="avg">0</span></div>
    </div>

    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div id="listPage" style="display:none;">
    <h1 id="listTitle">жҺ’иЎҢжҰң</h1>

    <div class="search-box">
      <input id="searchInput" placeholder="жҗңе°Ӣе•Ҷе“ҒеҗҚ / еә—еҗҚ..." oninput="applySearch()">
    </div>

    <div id="list"></div>
  </div>

</div>

<script>
const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

let items = [];
let chart = null;
let currentPage = "dashboard";

function parseNum(str){
  if(!str) return 0;
  str = String(str).replace(/,/g,"").trim();
  if(str.includes("иҗ¬")) return parseFloat(str) * 10000 || 0;
  return parseFloat(str) || 0;
}

function sortByScore(arr){
  return [...arr].sort((a,b)=>b.score-a.score);
}

function deduplicate(data){
  const map = new Map();
  data.forEach(item=>{
    const key = item.url || item.title + "_" + item.shop;
    if(!map.has(key)){
      map.set(key,item);
      return;
    }
    const old = map.get(key);
    if(item.checked && !old.checked){
      map.set(key,item);
    }else if(item.checked === old.checked && item.score > old.score){
      map.set(key,item);
    }
  });
  return Array.from(map.values());
}

function showPage(page){
  currentPage = page;
  document.getElementById("dashboard").style.display="none";
  document.getElementById("listPage").style.display="none";

  if(page==="dashboard"){
    document.getElementById("dashboard").style.display="block";
    return;
  }

  document.getElementById("listPage").style.display="block";

  if(page==="list"){
    document.getElementById("listTitle").innerText="жҺ’иЎҢжҰңпјҲжңӘжЁҷиЁҳпјү";
  }

  if(page==="checked"){
    document.getElementById("listTitle").innerText="е·ІжЁҷиЁҳ";
  }

  applySearch();
}

function applySearch(){
  const keyword=document.getElementById("searchInput").value.toLowerCase();

  let data=currentPage==="checked"
    ?items.filter(i=>i.checked)
    :items.filter(i=>!i.checked);

  if(keyword){
    data=data.filter(i=>
      i.title.toLowerCase().includes(keyword) ||
      i.shop.toLowerCase().includes(keyword)
    );
  }

  renderList(sortByScore(data));
}

function renderList(data){
  let html="";
  if(data.length===0){
    document.getElementById("list").innerHTML="<div class='card'>зӣ®еүҚжІ’жңүиіҮж–ҷ</div>";
    return;
  }

  const maxScore=data[0]?.score||1;

  data.forEach((item,i)=>{
    const percent=((item.score/maxScore)*100).toFixed(0);

    html+=`
    <div class="card ${item.checked?'checked-card':''}">
      <div class="rank">#${i+1}</div>
      <div>е•Ҷе“ҒеҗҚпјҡ${item.title}</div>
      <div>еә—еҗҚпјҡ${item.shop}</div>
      <div>йҠ·йҮҸпјҡ${item.sold}</div>
      <div>зІүзөІж•ёпјҡ${item.fans}</div>
      <div>зҷ»иЁҳе…¬еҸёпјҡ${item.company}</div>
      <div>зөұз·Ёпјҡ${item.taxId}</div>
      <div><b>дҫөж¬ҠжҢҮж•ёпјҡ${percent}%</b></div>

      <div style="margin-top:10px;display:flex;gap:10px;">
        <button class="view" onclick="openItem('${item.docId}')">жҹҘзңӢ</button>
        <button class="check" onclick="toggleCheck('${item.docId}')">
          ${item.checked?'еҸ–ж¶ҲжЁҷиЁҳ':'вң”жЁҷиЁҳ'}
        </button>
        <button class="delete" onclick="deleteItem('${item.docId}')">еҲӘйҷӨ</button>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
}

function openItem(docId){
  const item=items.find(i=>i.docId===docId);
  if(item?.url) window.open(item.url,"_blank");
}

async function toggleCheck(docId){
  const item=items.find(i=>i.docId===docId);
  if(!item) return;

  const newValue=!item.checked;

  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}?updateMask.fieldPaths=checked`,
    {
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        fields:{checked:{booleanValue:newValue}}
      })
    }
  );

  item.checked=newValue;

  /* вӯҗ еҜ«е…Ҙи©Ұз®—иЎЁ */
  if(newValue){
    fetch("https://script.google.com/macros/s/AKfycbxIV9RaYgISphgSNgNWfTN73c1HwyBu-bDHUFH1IFH9kaalgfAa08EBamoBqtQzrP_0/exec",{
      method:"POST",
      body:JSON.stringify({
        title:item.title,
        url:item.url,
        shop:item.shop,
        fans:item.fans,
        company:item.company,
        taxId:item.taxId,
        sold:item.sold
      })
    });
  }

  renderDashboard();
  applySearch();
}

async function deleteItem(docId){
  if(!confirm("зўәе®ҡеҲӘйҷӨпјҹ")) return;

  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}`,
    {method:"DELETE"}
  );

  items=items.filter(i=>i.docId!==docId);
  renderDashboard();
  applySearch();
}

function renderDashboard(){
  const total=items.length;
  const checked=items.filter(i=>i.checked).length;
  const unchecked=total-checked;
  const avg=total?items.reduce((a,b)=>a+b.score,0)/total:0;

  document.getElementById("total").innerText=total;
  document.getElementById("checkedCount").innerText=checked;
  document.getElementById("uncheckedCount").innerText=unchecked;
  document.getElementById("avg").innerText=avg.toFixed(0);

  renderChart();
}

function renderChart(){
  const ranges=[0,0,0,0,0];
  const maxScore=Math.max(...items.map(i=>i.score),1);

  items.forEach(item=>{
    const p=(item.score/maxScore)*100;
    if(p<=20)ranges[0]++;
    else if(p<=40)ranges[1]++;
    else if(p<=60)ranges[2]++;
    else if(p<=80)ranges[3]++;
    else ranges[4]++;
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["0-20","20-40","40-60","60-80","80-100"],
      datasets:[{label:"дҫөж¬ҠеҲҶеёғ",data:ranges}]
    }
  });
}

async function loadData(){
  const res=await fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`);
  const data=await res.json();

  const raw=data.documents.map(doc=>{
    const f=doc.fields;
    const sold=f.sold?.stringValue||"0";
    const fans=f.fans?.stringValue||"0";

    return {
      docId:doc.name.split("/").pop(),
      title:f.title?.stringValue||"",
      shop:f.shop?.stringValue||"",
      sold,fans,
      company:f.company?.stringValue||"",
      taxId:f.taxId?.stringValue||"",
      url:f.url?.stringValue||"",
      checked:f.checked?.booleanValue||false,
      score:parseNum(sold)*0.7+parseNum(fans)*0.3
    };
  });

  items=deduplicate(raw);
  renderDashboard();
}

loadData();
</script>

</body>
</html>
