<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopeeHunter Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#06111f;--border:#1f4f86;--blue:#2f8cff;--cyan:#58d7ff;--green:#38d996;--red:#ff4d6d;--yellow:#f7c948;--text:#eef6ff;--muted:#8db4de;--shadow:0 18px 42px rgba(0,0,0,.28)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,"Noto Sans TC",sans-serif;background:radial-gradient(circle at top left,rgba(47,140,255,.18),transparent 34%),var(--bg);color:var(--text)}
    button,input{font-family:inherit}a{color:var(--cyan)}
    .layout{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh}
    .sidebar{background:linear-gradient(180deg,#071a30,#06111f);border-right:1px solid var(--border);padding:24px 18px;position:sticky;top:0;height:100vh}
    .logo{margin-bottom:30px}.logo h1{margin:0;font-size:25px}.logo p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
    .nav{display:grid;gap:10px}.nav button{width:100%;height:44px;border:1px solid transparent;border-radius:8px;color:var(--muted);background:transparent;cursor:pointer;text-align:left;padding:0 14px;font-weight:700;font-size:15px}
    .nav button.active,.nav button:hover{color:#fff;background:rgba(47,140,255,.16);border-color:rgba(88,215,255,.28)}
    .user-box{position:absolute;left:18px;right:18px;bottom:22px;padding:14px;background:rgba(11,32,56,.8);border:1px solid rgba(88,215,255,.18);border-radius:8px;color:var(--muted);font-size:13px}
    .user-box strong{display:block;color:#fff;margin-top:6px;word-break:break-word}
    .main{padding:26px;min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:22px}
    .page-title h2{margin:0;font-size:28px}.page-title p{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.5}
    .top-actions{display:flex;align-items:center;gap:10px}
    .refresh-btn,.danger-action{height:40px;border-radius:8px;color:#fff;cursor:pointer;font-weight:800;padding:0 16px;white-space:nowrap}
    .refresh-btn{border:1px solid rgba(88,215,255,.38);background:rgba(47,140,255,.18)}
    .danger-action{border:1px solid rgba(255,77,109,.55);background:rgba(255,77,109,.2)}
    .refresh-btn:hover{background:rgba(47,140,255,.32)}.danger-action:hover{background:rgba(255,77,109,.34)}
    .refresh-btn:disabled,.danger-action:disabled{opacity:.55;cursor:not-allowed}
    .status{padding:11px 16px;min-width:160px;text-align:center;border:1px solid var(--border);border-radius:8px;background:rgba(7,24,43,.85);color:var(--muted);font-weight:700;font-size:14px;white-space:nowrap}
    .status.ok{color:var(--green)}.status.error{color:var(--red)}
    .sync-meta{width:100%;text-align:right;color:var(--muted);font-size:12px;margin-top:-10px;margin-bottom:16px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
    .stat,.chart-panel,.card,.empty{background:linear-gradient(180deg,rgba(15,42,73,.95),rgba(11,32,56,.95));border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow)}
    .stat{padding:18px;min-height:112px}.stat span{display:block;color:var(--muted);font-size:13px;margin-bottom:12px}.stat strong{display:block;font-size:30px;color:#fff;overflow-wrap:anywhere}
    .chart-panel{height:340px;padding:18px;margin-bottom:24px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px}.toolbar h3{margin:0;font-size:22px}.toolbar-actions{display:flex;gap:10px;align-items:center}
    .search,.category-select{width:min(380px,100%);height:42px;border:1px solid var(--border);border-radius:8px;background:#071426;color:#fff;outline:none;padding:0 14px}.category-select{width:180px;font-weight:800}.search:focus,.category-select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(88,215,255,.12)}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(280px,1fr));gap:16px;align-items:stretch}
    .card{padding:18px;min-height:396px;display:grid;grid-template-rows:150px 74px 68px 38px;gap:14px}
    .product-area{height:150px;display:grid;grid-template-rows:78px 58px;gap:10px;overflow:hidden}
    .shop-title{margin:0;font-size:19px;line-height:1.35;color:#fff;font-weight:800;word-break:break-word;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .product-subtitle{color:var(--cyan);font-size:14px;line-height:1.45;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .company-info{color:var(--muted);font-size:13px;line-height:1.45;word-break:break-word;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.company-info strong{color:#fff}
    .company-block{height:74px;padding:10px 12px;background:rgba(6,17,31,.44);border:1px solid rgba(88,215,255,.13);border-radius:8px;display:grid;gap:6px;overflow:hidden}
    .data-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .data{height:68px;background:rgba(6,17,31,.68);border:1px solid rgba(88,215,255,.13);border-radius:8px;padding:10px 8px;min-width:0;display:flex;flex-direction:column;justify-content:center}
    .data span{display:block;color:var(--muted);font-size:12px;margin-bottom:6px;white-space:nowrap}.data strong{font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .actions{display:grid;grid-template-columns:1fr 1fr 86px;gap:8px}.actions button{height:38px;border:0;border-radius:8px;cursor:pointer;color:#fff;font-weight:800}
    .view-btn{background:var(--blue)}.mark-btn{background:#214f82}.mark-btn.marked{background:var(--yellow);color:#0b2038}.delete-btn{background:var(--red)}.restore-btn{background:var(--green);color:#062015}
    .actions button:disabled{opacity:.75;cursor:not-allowed}
    .empty{grid-column:1/-1;padding:42px 20px;text-align:center;color:var(--muted);border-style:dashed;line-height:1.7}.hidden{display:none}
    .modal-mask{position:fixed;inset:0;background:rgba(3,9,17,.82);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
    .modal{width:min(420px,100%);background:#0b2038;border:1px solid var(--border);border-radius:8px;padding:24px;box-shadow:var(--shadow)}.modal h2{margin:0 0 10px}.modal p{margin:0 0 18px;color:var(--muted);line-height:1.5}
    .modal input{width:100%;height:44px;border:1px solid var(--border);border-radius:8px;background:#071426;color:#fff;padding:0 14px;outline:none;margin-bottom:14px}.modal button{width:100%;height:42px;border:0;border-radius:8px;color:#fff;background:var(--blue);font-weight:800;cursor:pointer}
    .app-notice{position:fixed;right:24px;bottom:24px;z-index:999999;max-width:340px;padding:14px 16px;border-radius:8px;color:#fff;font-weight:800;line-height:1.45;box-shadow:0 12px 32px rgba(0,0,0,.35);display:none}
        .mobile-panel{background:linear-gradient(180deg,rgba(15,42,73,.95),rgba(11,32,56,.95));border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
    .mobile-form{display:grid;gap:12px;max-width:760px}.mobile-form textarea{min-height:180px;resize:vertical;border:1px solid var(--border);border-radius:8px;background:#071426;color:#fff;outline:none;padding:12px 14px;line-height:1.6}.mobile-form textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(88,215,255,.12)}
    .mobile-table{width:100%;border-collapse:collapse;background:linear-gradient(180deg,rgba(15,42,73,.95),rgba(11,32,56,.95));border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow)}
    .mobile-table th,.mobile-table td{border-bottom:1px solid rgba(88,215,255,.13);padding:12px;text-align:left;vertical-align:middle}.mobile-table th{color:var(--muted);font-size:13px;background:rgba(6,17,31,.36)}.mobile-table td{color:#fff;font-size:14px}.mobile-table tr:last-child td{border-bottom:0}.url-cell{max-width:520px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cyan)}
    .mini-actions{display:flex;gap:8px}.mini-actions button,.import-btn{height:36px;border:0;border-radius:8px;cursor:pointer;color:#fff;font-weight:800;padding:0 14px}.mini-view{background:var(--blue)}.mini-delete{background:var(--red)}.import-btn{background:var(--green);color:#062015;width:max-content}.mobile-toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
    @media(max-width:1120px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(2,minmax(280px,1fr))}}
    @media(max-width:760px){.layout{grid-template-columns:190px minmax(0,1fr)}.sidebar{padding:18px 12px}.logo h1{font-size:20px}.main{padding:18px}.topbar,.toolbar{flex-direction:column;align-items:stretch}.top-actions,.toolbar-actions{align-items:stretch;flex-direction:column}.stats,.grid{grid-template-columns:1fr}.chart-panel{height:300px}.card{min-height:396px;grid-template-rows:150px 74px 68px auto}.actions{grid-template-columns:1fr}.user-box{left:12px;right:12px}}
  </style>
</head>
<body>
  <div id="loginModal" class="modal-mask">
    <div class="modal">
      <h2>輸入使用者名稱</h2>
      <p>每次進入或重新整理網站都需要輸入，方便多人使用時辨識操作來源。</p>
      <input id="usernameInput" type="text" placeholder="例如：Amy、業務A、管理員" autocomplete="off" />
      <button id="loginBtn" type="button">進入網站</button>
    </div>
  </div>

  <div id="appNotice" class="app-notice"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <h1>ShopeeHunter</h1>
        <p>Google Sheet 同步監控後台</p>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-page="dashboard" type="button">首頁</button>
        <button class="nav-btn" data-page="ranking" type="button">排行榜</button>
        <button class="nav-btn" data-page="marked" type="button">已標記</button>
        <button class="nav-btn" data-page="trash" type="button">垃圾桶</button>
        <button class="nav-btn" data-page="mobileImport" type="button">手機匯入資料</button>
        <button id="mobilePendingNavBtn" class="nav-btn" data-page="mobilePending" type="button">手機待確認</button>
      </nav>
      <div class="user-box">目前使用者<strong id="currentUser">尚未登入</strong></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">首頁</h2>
          <p id="pageSubtitle">總覽目前試算表同步資料、排行榜與風險區間分布。</p>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="refresh-btn" type="button">刷新資料</button>
          <div id="status" class="status">等待登入</div>
        </div>
      </header>

      <section id="dashboardPage">
        <section class="stats">
          <div class="stat"><span>總筆數</span><strong id="totalCount">0</strong></div>
          <div class="stat"><span>平均指數</span><strong id="avgIndex">0</strong></div>
          <div class="stat"><span>最高銷量</span><strong id="maxSales">0</strong></div>
          <div class="stat"><span>已標記</span><strong id="markedCount">0</strong></div>
        </section>
        <section class="chart-panel"><canvas id="mainChart"></canvas></section>
      </section>

      <section id="rankingPage" class="hidden">
        <div class="toolbar">
          <h3>排行榜</h3>
          <div class="toolbar-actions"><select id="categoryFilter" class="category-select"><option value="全部">全部</option><option value="鞋托架">鞋托架</option><option value="置物架">置物架</option><option value="手機架">手機架</option><option value="文件盒">文件盒</option><option value="鏡櫃盒">鏡櫃盒</option><option value="翻蓋盒">翻蓋盒</option></select><input id="searchInput" class="search" type="search" placeholder="搜尋店名、商品名、公司、統編" /></div>
        </div>
        <section id="rankingGrid" class="grid"><div class="empty">資料載入中...</div></section>
      </section>

      <section id="markedPage" class="hidden">
        <div class="toolbar">
          <h3>已標記</h3>
          <input id="markedSearchInput" class="search" type="search" placeholder="搜尋已標記店名、商品名、公司、統編" />
        </div>
        <section id="markedGrid" class="grid"><div class="empty">尚無已標記資料</div></section>
      </section>

      <section id="trashPage" class="hidden">
        <div class="toolbar">
          <h3>垃圾桶</h3>
          <div class="toolbar-actions">
            <input id="trashSearchInput" class="search" type="search" placeholder="搜尋垃圾桶店名、商品名、公司、統編" />
            <button id="bulkDeleteTrashBtn" class="danger-action" type="button">一鍵刪除</button>
          </div>
        </div>
        <section id="trashGrid" class="grid"><div class="empty">垃圾桶沒有資料</div></section>
      </section>

      <section id="mobileImportPage" class="hidden">
        <div class="toolbar">
          <h3>手機匯入資料</h3>
        </div>
        <div class="mobile-panel">
          <div class="mobile-form">
            <select id="mobileImportCategory" class="category-select">
              <option value="鞋托架">鞋托架</option>
              <option value="置物架">置物架</option>
              <option value="手機架">手機架</option>
              <option value="文件盒">文件盒</option>
              <option value="鏡櫃盒">鏡櫃盒</option>
              <option value="翻蓋盒">翻蓋盒</option>
            </select>
            <textarea id="mobileImportUrls" placeholder="請貼上蝦皮商品網址，一行一筆"></textarea>
            <button id="mobileImportBtn" class="import-btn" type="button">匯入手機資料</button>
          </div>
        </div>
      </section>

      <section id="mobilePendingPage" class="hidden">
        <div class="toolbar">
          <h3>手機待確認</h3>
          <div class="toolbar-actions">
            <select id="mobilePendingCategory" class="category-select">
              <option value="全部">全部</option>
              <option value="鞋托架">鞋托架</option>
              <option value="置物架">置物架</option>
              <option value="手機架">手機架</option>
              <option value="文件盒">文件盒</option>
              <option value="鏡櫃盒">鏡櫃盒</option>
              <option value="翻蓋盒">翻蓋盒</option>
            </select>
          </div>
        </div>
        <section id="mobilePendingList"><div class="empty">手機待確認目前沒有資料</div></section>
      </section>
    </main>
  </div>

  <script>
    const OPENSHEET_URL = "https://opensheet.elk.sh/1-oQQ4gEThHOcZKq2VlSnsv0lll1JVXrcjChKweCz5o8/Sheet1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxPEwonvYIRO8Qj98t_Im1HuC04nj3N7EkfwISVMmBpIsszm0cspifUyJyyJi_K4ay3/exec";
    const PRODUCT_CATEGORIES = ["鞋托架", "置物架", "手機架", "文件盒", "鏡櫃盒", "翻蓋盒"];
    const AUTO_REFRESH_MS = 10000;

    let currentUser = "";
    let allItems = [];
    let chart = null;
    let isLoading = false;
    let isMutating = false;
    let autoRefreshTimer = null;
    const permanentlyDeletedIds = new Set();

    const loginModal = document.getElementById("loginModal");
    const usernameInput = document.getElementById("usernameInput");
    const loginBtn = document.getElementById("loginBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const bulkDeleteTrashBtn = document.getElementById("bulkDeleteTrashBtn");
    const currentUserEl = document.getElementById("currentUser");
    const statusEl = document.getElementById("status");
    const syncMeta = document.getElementById("syncMeta");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const appNotice = document.getElementById("appNotice");

    const dashboardPage = document.getElementById("dashboardPage");
    const rankingPage = document.getElementById("rankingPage");
    const markedPage = document.getElementById("markedPage");
    const trashPage = document.getElementById("trashPage");
    const mobileImportPage = document.getElementById("mobileImportPage");
    const mobilePendingPage = document.getElementById("mobilePendingPage");
    const mobileImportCategory = document.getElementById("mobileImportCategory");
    const mobileImportUrls = document.getElementById("mobileImportUrls");
    const mobileImportBtn = document.getElementById("mobileImportBtn");
    const mobilePendingCategory = document.getElementById("mobilePendingCategory");
    const mobilePendingList = document.getElementById("mobilePendingList");
    const mobilePendingNavBtn = document.getElementById("mobilePendingNavBtn");

    const totalCountEl = document.getElementById("totalCount");
    const avgIndexEl = document.getElementById("avgIndex");
    const maxSalesEl = document.getElementById("maxSales");
    const markedCountEl = document.getElementById("markedCount");

    const rankingGrid = document.getElementById("rankingGrid");
    const markedGrid = document.getElementById("markedGrid");
    const trashGrid = document.getElementById("trashGrid");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const markedSearchInput = document.getElementById("markedSearchInput");
    const trashSearchInput = document.getElementById("trashSearchInput");

    function showAppNotice(text, type = "info") {
      appNotice.textContent = text;
      appNotice.style.display = "block";
      appNotice.style.background = type === "error" ? "#ff4d6d" : type === "success" ? "#16a76f" : "#2f8cff";
      if (type !== "loading") setTimeout(() => appNotice.style.display = "none", 2800);
    }

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status " + type;
    }
    function setSyncTime() {
      const time = new Date().toLocaleTimeString("zh-TW", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      const target = document.getElementById("syncMeta");
      if (target) target.textContent = `自動同步：每 10 秒｜最後同步：${time}`;
    }

    function textValue(value) {
      return String(value || "").trim();
    }

    function cleanKey(value) {
      return String(value || "").replace(/\uFEFF/g, "").replace(/\u00A0/g, " ").replace(/\s+/g, "").trim();
    }

    function numberValue(value) {
      let text = String(value || "").trim();
      if (!text) return 0;
      text = text.replaceAll(",", "").replaceAll("+", "").replaceAll("＋", "").replace(/\s/g, "");
      let multiplier = 1;
      if (text.includes("萬")) { multiplier = 10000; text = text.replace("萬", ""); }
      if (text.toLowerCase().includes("k")) { multiplier = 1000; text = text.toLowerCase().replace("k", ""); }
      const n = Number(text.replace(/[^\d.-]/g, ""));
      return Number.isFinite(n) ? Math.round(n * multiplier) : 0;
    }

    function displayValue(rawValue, numericValue) {
      const raw = textValue(rawValue);
      return raw || formatNumber(numericValue);
    }

    function formatNumber(value) {
      const n = Number(value) || 0;
      if (n >= 10000) {
        const v = n / 10000;
        return Number.isInteger(v) ? `${v}萬` : `${v.toFixed(1)}萬`;
      }
      return n.toLocaleString();
    }

    function normalizeRowKeys(row) {
      const normalized = {};
      Object.keys(row || {}).forEach(key => normalized[cleanKey(key)] = row[key]);
      return normalized;
    }

    function getField(row, names) {
      const normalizedRow = normalizeRowKeys(row);
      for (const name of names) {
        const cleanName = cleanKey(name);
        if (normalizedRow[cleanName] !== undefined && String(normalizedRow[cleanName]).trim() !== "") {
          return normalizedRow[cleanName];
        }
      }
      return "";
    }

    function calcIndex(sales, fans) {
      const salesScore = Math.min(sales / 100, 70);
      const fanScore = Math.min(fans / 1000, 30);
      return Math.round(Math.min(100, salesScore + fanScore));
    }

    function normalizeRow(row) {
      const id = textValue(getField(row, ["ID", "Id", "id"]));
      const url = textValue(getField(row, ["URL", "url", "網址"]));
      const product = textValue(getField(row, ["商品", "商品名", "Product", "product"]));
      const shop = textValue(getField(row, ["店名", "商店", "Shop", "shop"]));
      const company = textValue(getField(row, ["公司", "公司名", "登記公司", "Company", "company"]));
      const taxId = textValue(getField(row, ["統編", "統一編號", "Tax ID", "taxId", "taxid"]));
      const status = textValue(getField(row, ["狀態", "status", "Status"]));
      const category = textValue(getField(row, ["分類", "category", "Category"]));
      const rawFans = getField(row, ["粉絲", "粉絲數", "Fans", "fans"]);
      const rawSales = getField(row, ["銷量", "銷售", "Sales", "sales"]);
      const fans = numberValue(rawFans);
      const sales = numberValue(rawSales);

      return {
        id, url,
        product: product || "未命名商品",
        shop: shop || "未命名店名",
        company: company || "無",
        taxId: taxId || "無",
        status,
        category: PRODUCT_CATEGORIES.includes(category) ? category : "未分類",
        fans, sales,
        fansDisplay: displayValue(rawFans, fans),
        salesDisplay: displayValue(rawSales, sales),
        index: calcIndex(sales, fans)
      };
    }

    function dedupeItems(items) {
      const map = new Map();
      for (const item of items) {
        const key = item.id || item.url || `${item.product}-${item.shop}`;
        if (!key) continue;
        if (!map.has(key)) {
          map.set(key, item);
          continue;
        }
        const oldItem = map.get(key);
        if (item.sales >= oldItem.sales) map.set(key, item);
      }
      return Array.from(map.values());
    }

    async function loadData(options = {}) {
      const silent = options.silent === true;

      if (!currentUser) {
        if (!silent) {
          alert("請先輸入使用者名稱。");
          usernameInput.focus();
        }
        return;
      }
      if (isLoading || isMutating) return;

      isLoading = true;
      refreshBtn.disabled = true;
      if (!silent) {
        refreshBtn.textContent = "同步中";
        setStatus("資料同步中");
      }

      try {
        const res = await fetch(OPENSHEET_URL, { cache: "reload" });
        if (!res.ok) throw new Error("OpenSheet HTTP " + res.status);

        const rows = await res.json();
        if (!Array.isArray(rows)) throw new Error(rows && rows.error ? rows.error : "OpenSheet 回傳格式不是陣列");

        const normalizedItems = rows
          .map(normalizeRow)
          .filter(item => item.id && item.product)
          .filter(item => !permanentlyDeletedIds.has(item.id));

        if (!normalizedItems.length && rows.length) {
          const firstKeys = Object.keys(rows[0]).join("、");
          throw new Error("有讀到資料，但欄位對不上。實際欄位：" + firstKeys);
        }

        allItems = dedupeItems(normalizedItems);
        renderAll();
        setStatus("資料已同步", "ok");
        setSyncTime();
      } catch (error) {
        console.error(error);
        if (!silent) {
          allItems = [];
          renderAll();
          setStatus("資料載入失敗", "error");
          const message = `<div class="empty">資料讀取失敗：${escapeHtml(error.message)}<br><br><a href="${OPENSHEET_URL}" target="_blank" rel="noopener noreferrer">測試 opensheet 資料連結</a></div>`;
          rankingGrid.innerHTML = message;
          markedGrid.innerHTML = message;
          trashGrid.innerHTML = message;
        } else {
          setStatus("自動同步失敗", "error");
        }
      } finally {
        isLoading = false;
        refreshBtn.disabled = false;
        refreshBtn.textContent = "刷新資料";
      }
    }

      const target = [item.shop, item.product, item.company, item.taxId].join(" ").toLowerCase();
      return target.includes(keyword);

    function renderStats() {

      const total = activeItems.length;
      const avg = total ? Math.round(activeItems.reduce((sum, item) => sum + item.index, 0) / total) : 0;
      const maxSalesItem = activeItems.reduce((top, item) => item.sales > top.sales ? item : top, { sales: 0, salesDisplay: "0" });

      totalCountEl.textContent = total.toLocaleString();
      avgIndexEl.textContent = avg.toLocaleString();
      maxSalesEl.textContent = maxSalesItem.salesDisplay || formatNumber(maxSalesItem.sales);
      markedCountEl.textContent = getMarkedItems().length.toLocaleString();
    }

    function getIndexBuckets(items) {
      const buckets = [
        { label: "0-20", min: 0, max: 20, count: 0, sales: 0 },
        { label: "21-40", min: 21, max: 40, count: 0, sales: 0 },
        { label: "41-60", min: 41, max: 60, count: 0, sales: 0 },
        { label: "61-80", min: 61, max: 80, count: 0, sales: 0 },
        { label: "81-100", min: 81, max: 100, count: 0, sales: 0 }
      ];
      for (const item of items) {
        const bucket = buckets.find(group => item.index >= group.min && item.index <= group.max);
        if (bucket) {
          bucket.count += 1;
          bucket.sales += item.sales;
        }
      }
      return buckets;
    }

        type: "bar",

    async function copyTextToClipboard(text) {
      const value = String(text || "").trim();
      if (!value) return false;

      try {
        await navigator.clipboard.writeText(value);
        return true;
      } catch (error) {
        const input = document.createElement("textarea");
        input.value = value;
        input.style.position = "fixed";
        input.style.left = "-9999px";
        input.style.top = "-9999px";
        document.body.appendChild(input);
        input.focus();
        input.select();

        try {
          document.execCommand("copy");
          return true;
        } catch {
          return false;
        } finally {
          document.body.removeChild(input);
        }
      }
    }

      launcher.style.display = "none";

    async function postGas(body) {
      isMutating = true;
      try {
        const res = await fetch(GAS_URL, { method: "POST", body });
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch {
          return { success: res.ok, message: text };
        }
      } finally {
        isMutating = false;
      }
    }

      showAppNotice(`正在${actionText}資料，請稍候...`, "loading");

        const body = new URLSearchParams();
        body.set("action", "mark");
        body.set("id", id);
        body.set("status", nextStatus);
        body.set("user", currentUser);

        const result = await postGas(body);
        if (!result.success) throw new Error(result.message || "GAS 未回傳 success:true");

        item.status = nextStatus;
        renderAll();
        setStatus(`${actionText}成功`, "ok");
        showAppNotice(`${actionText}完成，試算表已同步`, "success");
      } catch (error) {
        alert(`${actionText}失敗：` + error.message);
        setStatus(`${actionText}失敗`, "error");

    async function bulkDeleteTrash() {
      const trashItems = getTrashItems();

      if (!trashItems.length) {
        alert("垃圾桶沒有資料可以刪除。");
        return;
      }

      const ok = confirm(`確定要永久刪除垃圾桶裡的 ${trashItems.length} 筆資料？\n\n這會直接刪除試算表中所有狀態為「已刪除」的資料，刪除後無法從網站復原。`);
      if (!ok) return;

      bulkDeleteTrashBtn.disabled = true;
      bulkDeleteTrashBtn.textContent = "刪除中";
      showAppNotice(`正在永久刪除垃圾桶 ${trashItems.length} 筆資料，請稍候...`, "loading");
      setStatus("垃圾桶刪除中");

      try {
        const body = new URLSearchParams();
        body.set("action", "bulkDeleteTrash");
        body.set("user", currentUser);

        const result = await postGas(body);
        if (!result.success) throw new Error(result.message || "GAS 未回傳 success:true");

        trashItems.forEach(item => permanentlyDeletedIds.add(item.id));
        allItems = allItems.filter(item => item.status !== "已刪除");

        renderAll();

        const deletedCount = result.deletedCount || trashItems.length;
        setStatus("垃圾桶已清空", "ok");
        showAppNotice(`永久刪除完成，共刪除 ${deletedCount} 筆資料`, "success");
      } catch (error) {
        alert("一鍵刪除失敗：" + error.message);
        setStatus("垃圾桶刪除失敗", "error");
        showAppNotice("一鍵刪除失敗，請稍後再試", "error");
      } finally {
        bulkDeleteTrashBtn.disabled = getTrashItems().length === 0;
        bulkDeleteTrashBtn.textContent = "一鍵刪除";
      }
    }

      if (page === "mobileImport") {
        pageTitle.textContent = "手機匯入資料";
        pageSubtitle.textContent = "手機圖搜圖找到的商品連結可先匯入，之後回電腦逐筆確認。";
      }

      if (page === "mobilePending") {
        pageTitle.textContent = "手機待確認";
        pageSubtitle.textContent = "用列表管理手機匯入的商品線索，查看後可用擴充功能正式抓資料。";
      }

      if (page === "trash") {
        pageTitle.textContent = "垃圾桶";
        pageSubtitle.textContent = "顯示網站端刪除的資料，可復原或一鍵永久刪除。";
      }
    }

    function login() {
      const name = usernameInput.value.trim();
      if (!name) {
        alert("請輸入使用者名稱。");
        usernameInput.focus();
        return;
      }
      currentUser = name;
      currentUserEl.textContent = name;
      loginModal.style.display = "none";
      loadData();
      startAutoRefresh();
    }

    function escapeHtml(value) {
      return String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value || "").replaceAll("\\", "\\\\").replaceAll("'", "\\'").replaceAll("\n", "\\n").replaceAll("\r", "");
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/["\\]/g, "\\$&");
    }

    document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => switchPage(btn.dataset.page)));
    searchInput.addEventListener("input", renderRanking);
    categoryFilter.addEventListener("change", renderRanking);
    markedSearchInput.addEventListener("input", renderMarked);
    trashSearchInput.addEventListener("input", renderTrash);
    loginBtn.addEventListener("click", login);
    refreshBtn.addEventListener("click", () => loadData());
    bulkDeleteTrashBtn.addEventListener("click", bulkDeleteTrash);
    mobileImportBtn.addEventListener("click", importMobileUrls);
    mobilePendingCategory.addEventListener("change", renderMobilePending);
    usernameInput.addEventListener("keydown", event => { if (event.key === "Enter") login(); });
    window.addEventListener("load", () => { usernameInput.focus(); switchPage("dashboard"); });
    window.addEventListener("beforeunload", stopAutoRefresh);
  </script>
</body>
</html>
