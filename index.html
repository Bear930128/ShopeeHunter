<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ShopeeHunter 後台</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
}

.sidebar{
  width:240px;
  background:#020617;
  height:100vh;
  padding:20px;
}

.sidebar h2{margin-bottom:20px;}

.group-title{
  margin-top:20px;
  margin-bottom:8px;
  font-size:12px;
  color:#64748b;
}

.sidebar button{
  width:100%;
  margin:6px 0;
  padding:12px;
  background:#0f172a;
  border:none;
  color:#94a3b8;
  cursor:pointer;
  text-align:left;
  border-radius:8px;
}

.sidebar button:hover{
  background:#1e293b;
  color:#fff;
}

.main{
  flex:1;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:12px 0;
  border-radius:12px;
  line-height:1.6;
  border:2px solid transparent;
}

.checked-card{
  border:2px solid #22c55e;
}

.rank{
  color:#facc15;
  font-weight:bold;
  margin-bottom:6px;
}

button.action{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.view{background:#3b82f6;color:#fff;}
.check{background:#22c55e;color:#fff;}
.delete{background:#ef4444;color:#fff;}

</style>
</head>

<body>

<div class="sidebar">
  <h2>🔥 ShopeeHunter</h2>

  <div class="group-title">主功能</div>
  <button onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button onclick="showPage('list')">📊 排行榜</button>
</div>

<div class="main">

  <div id="listPage">
    <h1>排行榜</h1>
    <div id="list"></div>
  </div>

</div>

<script>

const PROJECT_ID = "shopeehunter-84d05";
const COLLECTION = "shopee";

let items = [];

function parseNum(str){
  if(!str) return 0;
  str = str.replace(/,/g,"");
  if(str.includes("萬")) return parseFloat(str)*10000;
  return parseFloat(str)||0;
}

function showPage(page){
  document.getElementById("listPage").style.display = "block";
  render(items);
}

function render(data){

  let html = "";
  const maxScore = data[0]?.score || 1;

  data.forEach((item,i)=>{

    const percent = ((item.score/maxScore)*100).toFixed(0);

    html += `
    <div class="card ${item.checked ? 'checked-card' : ''}">

      <div class="rank">#${i+1}</div>

      <div>商品名：${item.title}</div>
      <div>店名：${item.shop}</div>
      <div>銷量：${item.sold}</div>
      <div>粉絲數：${item.fans}</div>
      <div>登記公司：${item.company || "無"}</div>
      <div>統一編號：${item.id || "無"}</div>

      <div><b>侵權指數：${percent}%</b></div>

      <div style="margin-top:10px;display:flex;gap:10px;">
        <button class="action view" onclick="openUrl('${item.url}')">查看</button>

        <button class="action check" onclick="toggleCheck('${item.docId}', ${item.checked})">
          ${item.checked ? '取消標記' : '✔標記'}
        </button>

        <button class="action delete" onclick="deleteItem('${item.docId}')">
          刪除
        </button>
      </div>

    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

function openUrl(url){
  window.open(url, "_blank");
}

async function toggleCheck(docId, current){

  const newValue = !current;

  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}?updateMask.fieldPaths=checked`,
    {
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        fields:{ checked:{ booleanValue:newValue } }
      })
    }
  );

  loadData();
}

async function deleteItem(docId){

  if(!confirm("確定刪除？")) return;

  await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}/${docId}`,
    { method:"DELETE" }
  );

  loadData();
}

async function loadData(){

  const res = await fetch(
    `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/${COLLECTION}`
  );

  const data = await res.json();

  items = data.documents.map(doc=>{
    const f = doc.fields;
    const docId = doc.name.split('/').pop();

    const sold = f.sold?.stringValue||"0";
    const fans = f.fans?.stringValue||"0";

    return {
      docId,
      title: f.title?.stringValue||"",
      shop: f.shop?.stringValue||"",
      sold,
      fans,
      company: f.company?.stringValue||"",
      id: f.taxId?.stringValue || "",
      url: f.url?.stringValue || "",
      checked: f.checked?.booleanValue||false,
      score: parseNum(sold)*0.7 + parseNum(fans)*0.3
    };
  });

  items.sort((a,b)=>b.score-a.score);

  render(items);
}

loadData();

</script>

</body>
</html>
