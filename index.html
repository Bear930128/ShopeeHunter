/* ⭐ 新增：通知函式 */
function showToast(text){
  const t=document.getElementById("toast");
  t.innerText=text;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

function parseNum(str){
  if(!str) return 0;
  str = String(str).replace(/,/g,"").trim();
  if(str.includes("萬")) return parseFloat(str) * 10000 || 0;
  return parseFloat(str) || 0;
}

function sortByScore(arr){
  return [...arr].sort((a,b)=>b.score-a.score);
}

function deduplicate(data){
  const map = new Map();
  data.forEach(item=>{
    const key = item.url || item.title + "_" + item.shop;
    if(!map.has(key)){
      map.set(key,item);
      return;
    }
    const old = map.get(key);
    if(item.checked && !old.checked){
      map.set(key,item);
    }else if(item.checked === old.checked && item.score > old.score){
      map.set(key,item);
    }
  });
  return Array.from(map.values());
}

function showPage(page){
  currentPage = page;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("listPage").style.display="none";

  if(page==="dashboard"){
    document.getElementById("dashboard").style.display="block";
    return;
  }

  document.getElementById("listPage").style.display="block";

  }

  if(page==="checked"){
    document.getElementById("listTitle").innerText="已標記";
  }

  applySearch();
}
