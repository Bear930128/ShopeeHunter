<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopeeHunter Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #061426;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      color: #fff;
    }

    .subtitle {
      color: #86b9ff;
      font-size: 14px;
    }

    .status {
      min-width: 160px;
      padding: 12px 18px;
      border: 1px solid #1e4e86;
      border-radius: 8px;
      color: #86b9ff;
      text-align: center;
      font-weight: 700;
      background: #071a31;
    }

    .status.error { color: #ff4d6d; }
    .status.ok { color: #3df5a5; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat-card,
    .chart-box,
    .product-card,
    .empty {
      background: #0b2038;
      border: 1px solid #1e4e86;
      border-radius: 8px;
    }

    .stat-card {
      padding: 24px;
    }

    .stat-label {
      color: #86b9ff;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
    }

    .chart-box {
      height: 400px;
      padding: 22px;
      margin-bottom: 34px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0;
      font-size: 26px;
    }

    .search {
      width: 360px;
      max-width: 100%;
      padding: 14px 18px;
      border-radius: 8px;
      border: 1px solid #1e4e86;
      background: #071426;
      color: #fff;
      outline: none;
    }

    .search:focus {
      border-color: #2f8cff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .product-card {
      padding: 20px;
    }

    .product-name {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.45;
    }

    .shop-name {
      color: #57c7ff;
      margin-bottom: 18px;
    }

    .info-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .info-box {
      background: #071426;
      border: 1px solid rgba(47, 140, 255, 0.25);
      border-radius: 8px;
      padding: 12px 8px;
    }

    .info-box span {
      display: block;
      color: #86b9ff;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .info-box strong {
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      height: 40px;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .view-btn {
      flex: 1;
      background: #2f8cff;
    }

    .delete-btn {
      width: 90px;
      background: #ff4d6d;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 44px 20px;
      color: #86b9ff;
      text-align: center;
      border-style: dashed;
    }

    @media (max-width: 900px) {
      .stats,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar,
      .section-head {
        flex-direction: column;
      }

      .search {
        width: 100%;
      }

      .chart-box {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div>
        <h1>ShopeeHunter</h1>
        <div class="subtitle">Google Sheet 即時資料 Dashboard</div>
      </div>
      <div id="status" class="status">資料載入中</div>
    </header>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-label">總筆數</div>
        <div id="totalCount" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均指數</div>
        <div id="avgIndex" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">最高銷量</div>
        <div id="maxSales" class="stat-value">0</div>
      </div>
    </section>

    <section class="chart-box">
      <canvas id="chart"></canvas>
    </section>

    <section class="section-head">
      <h2>排行榜</h2>
      <input id="searchInput" class="search" type="search" placeholder="搜尋商品名或店名" />
    </section>

    <section id="rankingGrid" class="grid">
      <div class="empty">資料載入中...</div>
    </section>
  </main>

  <script>
    const OPENSHEET_URL = "https://opensheet.elk.sh/1-oQQ4gEThHOcZKq2VlSnsv0lll1JVXrcjChKweCz5o8/Sheet1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxTn6fVF8lQbEk7HyfEU96G8yqPXYgX7TGVVcxNMpe4v92uhD4WGBEjduWJweEAGjxD4g/exec";

    let allItems = [];
    let chartInstance = null;

    const statusEl = document.getElementById("status");
    const totalCountEl = document.getElementById("totalCount");
    const avgIndexEl = document.getElementById("avgIndex");
    const maxSalesEl = document.getElementById("maxSales");
    const rankingGrid = document.getElementById("rankingGrid");
    const searchInput = document.getElementById("searchInput");

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status " + type;
    }

    function numberValue(value) {
      const n = Number(String(value || "").replace(/[^\d.-]/g, ""));
      return Number.isFinite(n) ? n : 0;
    }

    function textValue(value) {
      return String(value || "").trim();
    }

    function riskIndex(sales, fans) {
      const score = Math.round(Math.min(100, sales / 100 + fans / 1000));
      return Number.isFinite(score) ? score : 0;
    }

    function normalize(row, index) {
      const id = textValue(row.ID || row.Id || row.id);
      const url = textValue(row.URL || row.url);
      const product = textValue(row.商品 || row.Product || row.product);
      const shop = textValue(row.店名 || row.Shop || row.shop);
      const fans = numberValue(row.粉絲 || row.Fans || row.fans);
      const sales = numberValue(row.銷量 || row.Sales || row.sales);

      return {
        id,
        url,
        product: product || "未命名商品",
        shop: shop || "未命名店名",
        fans,
        sales,
        index: riskIndex(sales, fans),
        rowIndex: index
      };
    }

    async function loadData() {
      setStatus("資料載入中");

      try {
        const res = await fetch(OPENSHEET_URL, { cache: "no-store" });

        if (!res.ok) {
          throw new Error("OpenSheet HTTP " + res.status);
        }

        const rows = await res.json();

        if (!Array.isArray(rows)) {
          throw new Error("OpenSheet 回傳格式不是陣列");
        }

        allItems = rows
          .map(normalize)
          .filter(item => item.id && item.product);

        render();
        setStatus("資料已載入", "ok");
      } catch (err) {
        console.error(err);
        allItems = [];
        render();
        setStatus("資料載入失敗", "error");
        rankingGrid.innerHTML = `
          <div class="empty">
            無法讀取 Google 試算表資料。請確認試算表已開啟「知道連結的任何人可檢視」、分頁名稱是 Sheet1，且第一列欄位為 ID、時間、URL、商品、店名、粉絲、公司、統編、銷量。
          </div>
        `;
      }
    }

    function getFilteredItems() {
      const keyword = searchInput.value.trim().toLowerCase();

      return allItems
        .filter(item => {
          return item.product.toLowerCase().includes(keyword) ||
                 item.shop.toLowerCase().includes(keyword);
        })
        .sort((a, b) => b.index - a.index || b.sales - a.sales);
    }

    function render() {
      const items = getFilteredItems();
      renderStats(items);
      renderChart(items);
      renderCards(items);
    }

    function renderStats(items) {
      const total = items.length;
      const avg = total
        ? Math.round(items.reduce((sum, item) => sum + item.index, 0) / total)
        : 0;
      const maxSales = total ? Math.max(...items.map(item => item.sales)) : 0;

      totalCountEl.textContent = total.toLocaleString();
      avgIndexEl.textContent = avg.toLocaleString();
      maxSalesEl.textContent = maxSales.toLocaleString();
    }

    function renderChart(items) {
      const topItems = items.slice(0, 8);
      const labels = topItems.map(item => item.product.length > 12 ? item.product.slice(0, 12) + "..." : item.product);

      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: "侵權指數",
              data: topItems.map(item => item.index),
              backgroundColor: "rgba(47, 140, 255, 0.65)",
              borderColor: "#57c7ff",
              borderWidth: 1
            },
            {
              label: "銷量",
              data: topItems.map(item => item.sales),
              type: "line",
              borderColor: "#3df5a5",
              backgroundColor: "rgba(61, 245, 165, 0.15)",
              tension: 0.35,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: { color: "#fff" }
            }
          },
          scales: {
            x: {
              ticks: { color: "#86b9ff" },
              grid: { color: "rgba(134,185,255,0.12)" }
            },
            y: {
              beginAtZero: true,
              max: 100,
              ticks: { color: "#86b9ff" },
              grid: { color: "rgba(134,185,255,0.12)" }
            },
            y1: {
              beginAtZero: true,
              position: "right",
              ticks: { color: "#86b9ff" },
              grid: { drawOnChartArea: false }
            }
          }
        }
      });
    }

    function renderCards(items) {
      if (!items.length) {
        rankingGrid.innerHTML = '<div class="empty">沒有符合條件的資料</div>';
        return;
      }

      rankingGrid.innerHTML = items.map(item => `
        <article class="product-card" data-id="${escapeHtml(item.id)}">
          <h3 class="product-name">${escapeHtml(item.product)}</h3>
          <div class="shop-name">${escapeHtml(item.shop)}</div>

          <div class="info-row">
            <div class="info-box">
              <span>銷量</span>
              <strong>${item.sales.toLocaleString()}</strong>
            </div>
            <div class="info-box">
              <span>粉絲</span>
              <strong>${item.fans.toLocaleString()}</strong>
            </div>
            <div class="info-box">
              <span>侵權指數</span>
              <strong>${item.index}</strong>
            </div>
          </div>

          <div class="actions">
            <button class="view-btn" onclick="openProduct('${escapeJs(item.url)}')" ${item.url ? "" : "disabled"}>查看</button>
            <button class="delete-btn" onclick="deleteItem('${escapeJs(item.id)}')">刪除</button>
          </div>
        </article>
      `).join("");
    }

    function openProduct(url) {
      if (!url) return;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function deleteItem(id) {
      const item = allItems.find(x => x.id === id);

      if (!item) {
        alert("找不到這筆資料，請重新整理後再試。");
        return;
      }

      const confirmed = confirm(
        `確定要刪除這筆資料？\n\nID：${item.id}\n商品：${item.product}\n店名：${item.shop}`
      );

      if (!confirmed) return;

      const card = document.querySelector(`[data-id="${cssEscape(id)}"]`);
      const btn = card ? card.querySelector(".delete-btn") : null;

      if (btn) {
        btn.disabled = true;
        btn.textContent = "刪除中";
      }

      try {
        const body = new URLSearchParams();
        body.append("action", "delete");
        body.append("id", id);

        const res = await fetch(GAS_URL, {
          method: "POST",
          body
        });

        const text = await res.text();
        let result = {};

        try {
          result = JSON.parse(text);
        } catch {
          result = { success: res.ok, message: text };
        }

        if (!res.ok || result.success === false || result.ok === false) {
          throw new Error(result.message || "刪除失敗");
        }

        allItems = allItems.filter(x => x.id !== id);
        render();
        setStatus("刪除成功", "ok");

        setTimeout(loadData, 800);
      } catch (err) {
        console.error(err);
        alert("刪除失敗，請確認 GAS 有用 ID 刪除資料。");
        setStatus("刪除失敗", "error");

        if (btn) {
          btn.disabled = false;
          btn.textContent = "刪除";
        }
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value || "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll("\n", "\\n")
        .replaceAll("\r", "");
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/["\\]/g, "\\$&");
    }

    searchInput.addEventListener("input", render);
    loadData();
  </script>
</body>
</html>
